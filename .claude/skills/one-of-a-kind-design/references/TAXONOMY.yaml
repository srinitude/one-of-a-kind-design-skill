      - id: impressionism
        name: Impressionism
        description:
          "Soft, visible brushstrokes emphasizing light, color, and atmosphere over fine detail. Captures fleeting
          moments with a luminous, airy palette.

          "
        design_system_parameters:
          color_palette_type: soft pastels with warm highlights and cool shadows
          typography_family: humanist serif or light-weight sans-serif
          border_radii: 12–20px (soft, rounded)
          spacing_scale: generous / airy
          shadow_model: diffused layered blur with warm tint
          texture_grain: painterly brush-stroke overlay
          layout_philosophy: organic flow, loose grid alignment
        figma_implementation:
          component_notes:
            "Use generous padding and soft corner radii. Background fills should use gradient meshes or image fills
            with reduced opacity. Avoid hard borders; use tinted shadow layers instead.

            "
          style_library_tips:
            "Build a palette of 5–7 harmonious pastel swatches. Define blur and tint effect styles. Typography
            should feel understated with slightly increased line-height.

            "
        rive_motion:
          animation_curves: slow ease-in-out, gentle drift
          interaction_patterns: parallax depth on scroll, soft fade transitions
          state_machine_notes: blend trees for atmospheric transitions, no abrupt state changes
        generative_ai:
          positive_prompt:
            impressionist painting, visible brushstrokes, soft light, plein air, Monet style, luminous color, atmospheric
            haze, oil on canvas
          negative_prompt: sharp edges, digital render, flat color, geometric, crisp lines, photorealistic
          recommended_image_models:
