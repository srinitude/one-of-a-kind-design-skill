  cross_pollination:
    - recipe_id: terminal-nouveau
      parents:
        - brutalist-web
        - art-nouveau
      synthesis:
        "Art Nouveau's organic curves rendered in monospace ASCII art and terminal green. Vine patterns made of box-drawing
        characters. The ornamental meets the raw — every curve is assembled from right angles at sufficient density.

        "
      dials:
        design_variance: 10
        motion_intensity: 3
        visual_density: 7
      audience: developer-artists, creative coding communities, live-coding performance tools
    - recipe_id: data-impressionism
      parents:
        - impressionism
        - noise-field
      synthesis:
        "Real-time data rendered as painterly flow fields — stock prices as brushstroke direction, temperature as color
        warmth, volume as stroke density. The dashboard becomes a landscape that you learn to read atmospherically rather than
        numerically.

        "
      dials:
        design_variance: 8
        motion_intensity: 5
        visual_density: 4
      audience: ambient analytics, executive summary dashboards, environmental monitoring
    - recipe_id: clay-brutalism
      parents:
        - claymorphism
        - brutalist-web
      synthesis:
        "Brutalist raw-HTML structure with claymorphism's puffy, inflated inner-shadow treatment. System fonts and
        exposed grid, but every element looks squeezable. The confrontational honesty of brutalism wrapped in approachable softness.

        "
      dials:
        design_variance: 8
        motion_intensity: 4
        visual_density: 6
      audience: developer tools that want to be friendly, indie SaaS onboarding, accessible-first applications
    - recipe_id: deco-wireframe
      parents:
        - art-deco
        - wireframe-mesh
      synthesis:
        "Art Deco's geometric symmetry rendered as glowing wireframe meshes on dark backgrounds. The Chrysler Building
        as a polygon model. Gold wireframe lines with perspective-grid vanishing points. The 1920s meets the 2040s.

        "
      dials:
        design_variance: 7
        motion_intensity: 5
        visual_density: 5
      audience: premium fintech, architectural visualization, luxury tech products
    - recipe_id: riso-futurism
      parents:
        - risograph
        - afrofuturism
      synthesis:
        "Afrofuturist cultural geometry and cosmic motifs printed in risograph spot colors with deliberate misregistration.
        The cosmic becomes tactile, the digital becomes printed. Jewel-tone spot inks (gold, deep violet, fluorescent pink)
        on dark stock.

        "
      dials:
        design_variance: 8
        motion_intensity: 4
        visual_density: 7
      audience: music labels, cultural event branding, independent fashion, Afro-diasporic digital platforms
    - recipe_id: swiss-vaporwave
      parents:
        - swiss-international
        - vaporwave
      synthesis:
        "Strict Müller-Brockmann grid discipline applied to vaporwave's nostalgic palette. Pink-to-teal gradients
        confined to precisely calculated grid modules. Helvetica in neon. The mathematical rigor makes the irony sharper.

        "
      dials:
        design_variance: 6
        motion_intensity: 4
        visual_density: 6
      audience: retro-modern SaaS, nostalgia-aware tech products, design tool marketing
    - recipe_id: wabi-glass
      parents:
        - wabi-sabi
        - glassmorphism
      synthesis:
        "Frosted glass panels with organic imperfection — uneven blur gradients, slightly misaligned refraction borders,
        warm-tinted translucency over earthy textured backgrounds. The glass is handblown, not machine-cut.

        "
      dials:
        design_variance: 6
        motion_intensity: 3
        visual_density: 3
      audience: wellness platforms, ceramic/craft marketplaces, mindfulness apps, Japanese-inspired digital products
    - recipe_id: pop-data
      parents:
        - pop-art
        - isometric
      synthesis:
        "Isometric data visualization rendered in pop-art saturated flat colors with halftone textures and bold black
        outlines. Bar charts as Lichtenstein panels. Each data point is a comic frame. Makes analytics genuinely entertaining.

        "
      dials:
        design_variance: 7
        motion_intensity: 5
        visual_density: 8
      audience: marketing analytics dashboards, social media metrics, gamified data platforms
    - recipe_id: constructivist-pixel
      parents:
        - constructivism
        - pixel-art
      synthesis:
        "Constructivist diagonal compositions and propaganda energy rendered at deliberately low resolution. Red-and-black
        pixel posters. The revolutionary energy constrained to an 8-bit grid. Each pixel is a deliberate political act.

        "
      dials:
        design_variance: 9
        motion_intensity: 4
        visual_density: 8
      audience: indie game studios, zine culture platforms, protest-tech tools
    - recipe_id: minimal-cinema
      parents:
        - minimalism-fine-art
        - cinematic
      synthesis:
        "One image per viewport, letterboxed, with cinematic color grading and film grain — surrounded by vast typographic
        negative space. Every scroll is a scene change. The website as a film that reads itself.

        "
      dials:
        design_variance: 5
        motion_intensity: 4
        visual_density: 1
      audience: luxury fashion campaigns, single-product launches, film festival sites, architectural photography portfolios
    - recipe_id: memphis-dark
