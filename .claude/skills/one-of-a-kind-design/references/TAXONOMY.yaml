  prompt_format_adaptation_rules:
    description: >-
      When exporting prompts to external tools, adapt format to match the tool's
      native syntax. Raw prompts from prompt-crafter subagents are NEVER exported
      directly — they are always transformed to the target tool's format.
    midjourney:
      syntax: "{prompt} --ar {ratio} --style {style_value} --chaos {0-100} --weird {0-3000} --stylize {0-1000}"
      style_mapping:
        high_fidelity: "--style raw"
        artistic: "--style 4b"
      dial_mapping:
        design_variance: "--chaos {value * 10}"
        visual_density: "--stylize {value * 100}"
    comfyui:
      syntax: workflow_json
      note: generate complete node graph with KSampler, CLIPTextEncode, VAEDecode, SaveImage nodes
      checkpoint_mapping:
        photographic: "sd_xl_base_1.0.safetensors"
        illustrative: "dreamshaperXL_v2.safetensors"
    runway:
      syntax: plain_text with @reference tags
      note: reference images use @tag syntax (tag = 3-16 alphanumeric chars starting with letter)
      model_mapping:
        text_to_video: gen4.5
        image_to_video: gen4_turbo
    google_ai_studio:
      syntax: structured system_instruction + user message
    stability:
      syntax: plain_text with style_preset parameter
    elevenlabs:
      syntax: text with inline SSML-like delivery markers
    figma:
      syntax: tokens_studio_json
      note: export as Tokens Studio / Style Dictionary JSON, not CSS

custom_tool_schema:
  description: >-
    Schema for user-defined custom external tools. Users register tools not in
    the built-in external_tool_registry by providing a YAML definition that follows
    this schema. Definitions are stored in assets/custom-tools/{tool-id}.yaml
    and are automatically discovered by the export system alongside built-in tools.
  version: "1.0"
  schema:
    id:
      type: string
      required: true
      format: kebab-case
      description: unique identifier (e.g., "rive", "my-internal-design-tool")
    name:
      type: string
      required: true
      description: human-readable display name (e.g., "Rive", "Internal Design System v3")
    description:
      type: string
      required: true
      description: what this tool does (1-2 sentences)
    docs_url:
      type: string
      required: false
      description: official documentation URL (null if internal/undocumented)
    category:
      type: enum
      required: true
      values:
        - video
        - image-design
        - web-dev
        - ai-ml
        - code-ide
        - 3d-spatial
        - audio-music
        - collaboration
        - presentation
        - deployment
        - animation
        - prototyping
        - other
    accepts:
      type: object
      required: true
      description: what asset types the tool can consume
      fields:
        images: { type: boolean, description: "PNG/WebP/JPEG import" }
        svg: { type: boolean, description: "SVG import" }
        video: { type: boolean, description: "MP4/WebM import" }
        audio: { type: boolean, description: "MP3/WAV import" }
        three_d: { type: boolean, description: "GLB/FBX/USDZ import" }
        code: { type: boolean, description: "code/component import" }
        design_tokens:
          { type: boolean, description: "design token/variable import" }
        prompts: { type: boolean, description: "text prompt/generation input" }
    prompt_format:
      type: object
      required: false
      description: how prompts should be formatted for this tool
      fields:
        style: { type: enum, values: [plain_text, markdown, json, xml, custom] }
        max_length: { type: integer, description: "max prompt characters" }
        supports_negative: { type: boolean }
        special_syntax:
          {
            type: string,
            description: "tool-specific syntax (e.g., --ar 16:9)",
          }
        example:
          { type: string, description: "example prompt in this tool's format" }
    export_contents:
      type: object
      required: true
      description: what goes into the .zip export
      fields:
        include_images: { type: boolean }
        include_svg: { type: boolean }
        include_video: { type: boolean }
        include_audio: { type: boolean }
        include_3d: { type: boolean }
        include_code: { type: boolean }
        include_design_tokens: { type: boolean }
        include_prompts: { type: boolean }
        include_quality_report: { type: boolean, default: true }
        include_style_spec: { type: boolean, default: true }
        include_ux_research: { type: boolean, default: true }
        custom_config_files:
          type: array
          items:
            filename: string
            description: string
            format:
              { type: enum, values: [json, yaml, toml, xml, text, binary] }
    import_guide_hints:
      type: object
      required: false
      description: helps export-guide-writer produce accurate guides
      fields:
        import_method:
          { type: string, description: "e.g., File → Import → SVG" }
        key_ui_elements:
          {
            type: array,
            items: string,
            description: "e.g., [Canvas, Timeline]",
          }
        terminology:
          project:
            {
              type: string,
              description: "what 'project' is called in this tool",
            }
          component: { type: string, description: "what 'component' is called" }
          layer: { type: string, description: "what 'layer' is called" }
    trigger_keywords:
      type: array
      items: string
      required: true
      description: words that suggest this tool in user messages (checked during message enhancement)
    suggested_when:
      type: string
      required: true
      description: condition for proactively suggesting this tool

  example_registration:
    id: rive
    name: Rive
    description: >-
      Interactive animation platform with state machines for web, mobile, and games.
      Supports SVG import and building interactive animations with code-driven control.
    docs_url: https://rive.app/docs/
    category: animation
    accepts:
      images: true
      svg: true
      video: false
      audio: false
      three_d: false
      code: true
      design_tokens: false
      prompts: false
    export_contents:
      include_images: true
      include_svg: true
      include_video: false
      include_audio: false
      include_3d: false
      include_code: true
      include_design_tokens: false
      include_prompts: false
      include_quality_report: true
      include_style_spec: true
      include_ux_research: true
      custom_config_files:
        - filename: rive-state-machine.json
          description: state machine definition mapping taxonomy motion_signature to Rive states
          format: json
        - filename: rive-artboard-structure.md
          description: recommended artboard and layer structure for the taxonomy style
          format: text
    import_guide_hints:
      import_method: "File → Import → SVG or drag SVG onto canvas"
      key_ui_elements: [Canvas, Timeline, State Machine, Artboard]
      terminology:
        project: File
        component: Artboard
        layer: Object
    trigger_keywords:
      [rive, state machine animation, interactive animation, rive app]
    suggested_when: user needs interactive animations with state machines for web or mobile

  lifecycle:
    register: >-
      User says "register [tool] as export tool" → web search for docs → AskUserQuestion
      for missing fields → validate against schema → write YAML to assets/custom-tools/
    discover: >-
      generate-tool-export.ts reads BOTH references/EXTERNAL-TOOLS-REGISTRY.md
      and all assets/custom-tools/*.yaml files
    export: same .zip structure as built-in tools, export-guide-writer reads custom YAML
    update: "user says 'update [tool] definition' → re-run registration with existing YAML as base"
    remove: "user says 'remove [tool] from my tools' → delete YAML → confirm"
    list: "user says 'show my custom tools' → list all .yaml in assets/custom-tools/"
