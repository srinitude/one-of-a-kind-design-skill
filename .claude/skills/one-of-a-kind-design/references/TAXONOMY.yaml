  - category_name: Modern Digital / UI-Native Styles
    category_slug: modern-digital-ui
    styles:
      - id: flat-design
        name: Flat Design
        description:
          "Crisp two-dimensional elements with no gradients, shadows, or textures. Relies on bold color, clear typography,
          and simple iconography for visual hierarchy.

          "
        design_system_parameters:
          color_palette_type: bold, saturated flat palette with neutral base
          typography_family: geometric or grotesque sans-serif
          border_radii: 4–8px (subtle rounding)
          spacing_scale: consistent 8px base grid
          shadow_model: none
          texture_grain: none
          layout_philosophy: strict column grid, content-first hierarchy
        figma_implementation:
          component_notes:
            "Straightforward auto-layout components with consistent padding. No effect styles needed. Color is
            the primary differentiator between component states.

            "
          style_library_tips:
            "Build a robust color token system (6–10 hues with tints). No shadow or blur tokens. Icon set should
            be filled or outlined with uniform stroke weight.

            "
        rive_motion:
