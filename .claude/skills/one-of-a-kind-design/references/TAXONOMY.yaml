  controlnet_models:
    description: >-
      ControlNet models enforce structural constraints during image generation.
      They take a control signal (edges, depth map, pose skeleton, segmentation map)
      and force the generated image to respect that spatial structure. CRITICAL for
      reproducing specific layouts, maintaining architectural proportions, generating
      images that match wireframe compositions, and pose-accurate character illustrations.
    models:
      - model: Z-Image Turbo ControlNet
        fal_endpoint: fal-ai/z-image/turbo/controlnet
        tier: fast
        control_modes:
          - raw_image
          - canny_edges
          - depth_map
          - pose_skeleton
        strengths: 4 preprocessing modes in single model, multi-format output (JPEG/PNG/WebP), 1-4 variants simultaneously, ultra-fast 6B params, $0.0065/MP
        use_in_pipeline: generate style-faithful images that match wireframe layouts, architectural rendering from depth maps, character art with specific poses
        per_style_control_mode:
          bauhaus: canny_edges at control_strength 0.9 — enforce geometric grid structure
          de-stijl: canny_edges at control_strength 0.9 — enforce rectilinear grid
          constructivism: canny_edges at control_strength 0.8 — enforce diagonal compositions
          swiss-international: canny_edges at control_strength 0.8 — enforce mathematical grid
          art-nouveau: raw_image at control_strength 0.3 — preserve organic curves loosely
          isometric: depth_map at control_strength 0.8 — maintain consistent 3D perspective
          wireframe-mesh: depth_map at control_strength 0.7 — maintain spatial structure
          cinematic: depth_map at control_strength 0.5 — guide scene depth without rigidity
          surrealism: raw_image at control_strength 0.2 — allow maximum distortion
          pop-art: canny_edges at control_strength 0.6 — preserve comic panel structure
      - model: FLUX.1 [pro] ControlNet
        fal_endpoint: fal-ai/flux-pro/v1/controlnet
        tier: pro
        control_modes:
          - canny
          - depth
          - pose
        strengths: FLUX quality with structural guidance, fine-tuned LoRA support, premium output
        use_in_pipeline: high-quality hero image generation with precise layout constraints
      - model: FLUX.1 [dev] Depth
        fal_endpoint: fal-ai/flux-depth/dev
        tier: standard
        strengths: generate images from depth maps, scene understanding, parallax-ready output
        use_in_pipeline: create parallax-ready layered compositions from depth data
      - model: FLUX.1 [pro] Depth
        fal_endpoint: fal-ai/flux-depth/pro
        tier: pro
        strengths: premium depth-to-image generation, superior detail preservation
        use_in_pipeline: production-grade parallax hero imagery from depth maps
      - model: SDXL ControlNet Union
        fal_endpoint: fal-ai/sdxl-controlnet-union
        tier: standard
        control_modes:
          - depth
          - canny
          - teed
          - normal
          - segmentation
        strengths: multi-mode control in single model, inpainting support, 5 control types
        use_in_pipeline: rapid iteration with multiple control types, combined structural guidance
      - model: Pose Estimation
        fal_endpoint: fal-ai/pose-estimation
        tier: utility
        strengths: extract pose skeletons from images for use as ControlNet input
        use_in_pipeline: prep step for ControlNet pose-guided generation, analyze character positions in reference imagery

  editing_models:
    description: >-
      Models that modify existing images rather than generating from scratch.
      Enables inpainting (fill masked regions), style transfer (apply new aesthetics),
      outpainting (extend beyond original boundaries), and targeted local edits.
      CRITICAL for iterative refinement of hero assets, fixing composition issues
      flagged by UX annotation, and adapting generated images to match taxonomy color palettes.
    inpainting:
      - model: FLUX.1 [pro] Fill
        fal_endpoint: fal-ai/flux-pro/v1/fill
        tier: pro
        strengths: mask-based surgical editing, object replacement, gap filling, $0.05/MP
        use_in_pipeline: fix specific regions flagged by UX annotation, replace elements that conflict with style palette
      - model: FLUX General Inpainting
        fal_endpoint: fal-ai/flux-general/inpainting
        tier: standard
        strengths: LoRA + ControlNet + IP-Adapter support, versatile editing with multiple AI extensions
        use_in_pipeline: style-specific inpainting using taxonomy LoRA adaptations
      - model: OneReward
        fal_endpoint: fal-ai/onereward
        tier: standard
        strengths: fine-tuned FLUX 1.0 Fill with intelligent editing capabilities
        use_in_pipeline: smart object removal and replacement in hero imagery
    style_transfer:
      - model: FLUX Kontext [pro]
        fal_endpoint: fal-ai/flux-kontext/pro
        tier: pro
        strengths: multi-reference image conditioning via URL arrays, context-aware editing, style transfer from visual examples, $0.055/MP
