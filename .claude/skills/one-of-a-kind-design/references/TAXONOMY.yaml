  accessibility_bundles:
    - bundle_name: WCAG-AAA Safe Foundation
      styles:
        - flat-design
        - swiss-international
        - material-design
        - scandinavian-minimalism
      accessibility_features:
        contrast: All styles support AAA contrast ratios (7:1+) with standard token configuration
        typography: Sans-serif type systems with generous x-height and clear letterforms at all sizes
        motion_safety: Minimal animation by default; all motion is functional and respects prefers-reduced-motion
        wcag_compliance: WCAG 2.2 AAA achievable with standard implementation
      excluded_styles:
        - style_id: neomorphism
          exclusion_reason: Monochromatic low-contrast shadow pairs fail AA contrast requirements for interactive elements
        - style_id: glassmorphism
          exclusion_reason: Translucent panels over variable backgrounds create unpredictable contrast ratios
        - style_id: aurora-ui
          exclusion_reason: Gradient backgrounds make consistent text contrast extremely difficult to guarantee
        - style_id: psychedelic
          exclusion_reason: Saturated color cycling and pattern density can trigger photosensitive seizures
    - bundle_name: Reduced-Motion Safe
      styles:
        - flat-design
        - swiss-international
        - line-art
        - duotone
        - de-stijl
      accessibility_features:
        contrast: High-contrast styles that communicate hierarchy through color and size rather than motion
        typography: Clear typographic hierarchy that functions without animation to establish reading order
        motion_safety: All styles are inherently static — visual interest comes from composition, not movement
        wcag_compliance: WCAG 2.2 AA minimum; respects prefers-reduced-motion by requiring zero animation
      excluded_styles:
        - style_id: glitch
          exclusion_reason: Core aesthetic relies on rapid visual disruption that violates three-flashes-per-second rule
        - style_id: particle-systems
          exclusion_reason: Continuous particle motion is the defining feature and cannot be reduced without losing identity
        - style_id: psychedelic
          exclusion_reason: Pulsing, cycling colors and patterns are the core of the style and are motion-unsafe
        - style_id: vaporwave
          exclusion_reason: VHS tracking effects and color cycling animations may trigger vestibular disorders
    - bundle_name: High-Readability Editorial
      styles:
        - swiss-international
        - scandinavian-minimalism
        - dark-mode-ui
        - studio-product
      accessibility_features:
        contrast: Minimum 4.5:1 for body text, 7:1 for small text; dark mode uses tested surface hierarchy
        typography: Large body text (16px+), generous line-height (1.5+), maximum line-length constraints (65ch)
        motion_safety: Static by default; any motion limited to page transitions respecting system preferences
        wcag_compliance: WCAG 2.2 AA with straightforward path to AAA through spacing and sizing adjustments
      excluded_styles:
        - style_id: brutalist-web
          exclusion_reason: Irregular spacing and system-font defaults create unpredictable reading experiences
        - style_id: constructivism
          exclusion_reason:
            Extreme type scale compression and diagonal layouts impair reading flow for screen readers and low-vision
            users
        - style_id: surrealism
          exclusion_reason: Intentionally disorienting spatial relationships conflict with cognitive accessibility needs
    - bundle_name: Neurodivergent-Safe Editorial
      styles:
        - editorial-minimalism
        - resonant-stark
        - bento-ui
        - flat-design
      accessibility_features:
        contrast: Off-black (#111111) on warm white (#F7F6F3) achieves 15.4:1 — far exceeds AAA
        typography: Large body text (16px+), line-height 1.6, max-width 65ch — optimized for ADHD and dyslexia readability
        motion_safety: All motion gated behind prefers-reduced-motion; entry animations only, no continuous loops
        wcag_compliance: WCAG 2.2 AAA achievable with standard implementation
      excluded_styles:
        - style_id: liquid-glass
          exclusion_reason: Dynamic tinting over variable content creates unpredictable contrast — requires per-instance auditing
        - style_id: psychedelic
          exclusion_reason: Pattern density and color cycling trigger photosensitive seizures and overwhelm neurodivergent users
        - style_id: deconstructivism
          exclusion_reason: Deliberate spatial disorientation and overlapping text conflict with cognitive accessibility
        - style_id: glitch
          exclusion_reason: Rapid visual disruption violates seizure safety and creates anxiety for users with PTSD
conflicts:
  hard:
    - style_a: flat-design
      style_b: skeuomorphism
      reason:
        Fundamentally opposed philosophies — flat design explicitly rejects the textures, gradients, and realistic materials
        that define skeuomorphism.
      clashing_tags:
        - flat
        - textured
        - clean
        - glossy
    - style_a: minimalism-fine-art
      style_b: rococo
      reason: Minimalism eliminates all ornament; Rococo maximizes it. No middle ground exists that preserves either identity.
      clashing_tags:
        - minimalist
        - maximalist
        - sparse
        - dense
    - style_a: brutalist-web
      style_b: glassmorphism
      reason: Brutalism's raw, opaque, anti-polish aesthetic is incompatible with glassmorphism's refined translucent elegance.
      clashing_tags:
        - lo-fi
        - hi-fi
        - opaque
        - translucent
    - style_a: pixel-art
      style_b: hdr-hyperrealism
      reason: Pixel art requires visible discrete pixels and limited palettes; HDR demands maximum detail and tonal range.
      clashing_tags:
        - lo-fi
        - hi-fi
        - geometric
        - photorealistic
    - style_a: de-stijl
      style_b: art-nouveau
      reason: De Stijl permits only right angles and straight lines; Art Nouveau is defined by flowing organic curves.
      clashing_tags:
        - angular
        - curvilinear
        - geometric
        - organic
    - style_a: swiss-international
      style_b: psychedelic
      reason: Swiss rationality demands grid discipline and type clarity; psychedelic design intentionally dissolves both.
      clashing_tags:
        - ordered
        - chaotic
        - minimalist
        - maximalist
    - style_a: bauhaus
      style_b: rococo
      reason: Bauhaus eliminates decoration in service of function; Rococo exists purely for decorative excess.
      clashing_tags:
        - minimalist
        - maximalist
        - clean
        - textured
    - style_a: scandinavian-minimalism
      style_b: memphis-design
      reason: Scandinavian restraint and muted palettes clash with Memphis's clashing colors and anti-tasteful chaos.
      clashing_tags:
        - muted
        - saturated
        - sparse
        - dense
    - style_a: line-art
      style_b: hdr-hyperrealism
      reason: Line art's stroke-only abstraction is antithetical to HDR's demand for maximum photographic detail.
      clashing_tags:
        - minimalist
        - dense
        - monochromatic
        - polychromatic
    - style_a: neomorphism
      style_b: constructivism
      reason: Neomorphism's soft monochromatic subtlety is incompatible with constructivism's high-contrast angular dynamism.
      clashing_tags:
        - monochromatic
        - high-contrast
        - sparse
        - dense
    - style_a: wabi-sabi
      style_b: material-design
      reason: Wabi-sabi's deliberate imperfection and asymmetry fundamentally conflict with Material Design's systematic precision.
      clashing_tags:
        - organic
        - ordered
        - asymmetric
        - precise
    - style_a: neubrutalism
      style_b: liquid-glass
      reason:
        "Neubrutalism demands opaque, thick-bordered, anti-polish surfaces — liquid glass is the opposite: translucent,
        borderless, hyper-polished."
      clashing_tags:
        - raw
        - translucent
        - opaque
        - clean
    - style_a: suprematism
      style_b: rococo
      reason: Suprematism eliminates all representation in favor of pure geometry; Rococo exists for decorative representation.
      clashing_tags:
        - abstract
        - dense
        - sparse
        - curvilinear
    - style_a: arte-povera-digital
      style_b: y2k-revival
      reason:
        Arte Povera rejects industrial polish and celebrates humble materials; Y2K Revival celebrates chrome luxury and
        synthetic surfaces.
      clashing_tags:
        - raw
        - glossy
        - matte
        - precious
    - style_a: mono-ha
      style_b: memphis-design
      reason:
        Mono-ha demands singular material contemplation in vast silence; Memphis floods every surface with clashing color
