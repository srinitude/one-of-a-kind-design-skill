      - id: constructivism
        name: Constructivism
        description:
          "Bold, angular compositions with red-black-white color dominance, diagonal energy, and strong typographic
          hierarchy rooted in early Soviet graphic design and propaganda aesthetics.

          "
        design_system_parameters:
          color_palette_type: red, black, white, occasional ochre
          typography_family: condensed geometric sans-serif, bold weights
          border_radii: 0px (all sharp)
          spacing_scale: tight / dense, intentional overlap
          shadow_model: none
          texture_grain: newsprint or light halftone
          layout_philosophy: dynamic diagonals, asymmetric grid
        figma_implementation:
          component_notes:
            "Rotated frames and skewed auto-layout containers. Heavy use of absolute positioning for overlapping
            elements. Red accent components with high-contrast text overlays.

            "
          style_library_tips:
            "Minimal palette — 3 color tokens max. Typography scale should be dramatically compressed: very
            large headlines, very small body. No border-radius tokens needed.

            "
        rive_motion:
          animation_curves: linear mechanical, abrupt stops
          interaction_patterns: diagonal slide-in reveals, stamp/press effects
          state_machine_notes: binary toggle states, no blend — hard cuts between states
        generative_ai:
          positive_prompt:
            constructivist poster, red black white, bold diagonal composition, geometric shapes, propaganda style,
            Rodchenko, El Lissitzky, Soviet avant-garde
          negative_prompt: soft, pastel, organic, rounded, photorealistic, decorative, ornate
          recommended_image_models:
