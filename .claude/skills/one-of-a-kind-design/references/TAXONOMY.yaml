  utility_models:
    description: >-
      Specialized models for asset processing, enhancement, analysis, and preparation.
      These are composable pipeline stages — not generation models. They transform,
      enhance, annotate, or extend outputs from the image/video generation models.
    background_removal:
      - model: BiRefNet v2
        fal_endpoint: fal-ai/birefnet/v2
        tier: pro
        variants:
          - General Use (Light)
          - General Use (Light 2K)
          - General Use (Heavy)
          - Matting
          - Portrait
          - General Use (Dynamic)
        strengths: bilateral reference framework, hair-strand precision, transparent object handling, up to 2048x2048
        use_in_pipeline: isolate hero asset subjects for compositing over UI, extract product shots from cluttered backgrounds, create transparent PNGs
      - model: Bria RMBG 2.0
        fal_endpoint: fal-ai/bria/rmbg
        tier: standard
        strengths: commercially safe (trained exclusively on licensed data), fast, reliable for clean product shots
        use_in_pipeline: e-commerce product isolation, safe for client deliverables requiring license clarity
      - model: Video Background Removal
        fal_endpoint: fal-ai/bria/video/background-removal
        tier: pro
        strengths: per-frame background removal without green screen, temporal consistency across frames
        use_in_pipeline: clean video hero assets, create transparent video overlays for scroll-driven backgrounds
    upscaling:
      - model: Topaz Image Upscale
        fal_endpoint: fal-ai/topaz/upscale/image
        tier: premium
        variants:
          - Standard V2
          - Low Resolution V2
          - CGI
          - High Fidelity V2
          - Text Refine
          - Redefine
          - Recovery V2
        strengths: face enhancement, sharpening, denoising, up to 16x, subject detection, film grain control
        use_in_pipeline: upscale hero images to retina resolution, enhance AI-generated images that are soft or low-res
      - model: Topaz Video Upscale
        fal_endpoint: fal-ai/topaz/upscale/video
        tier: premium
        variants:
