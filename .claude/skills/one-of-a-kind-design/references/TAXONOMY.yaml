      - id: de-stijl
        name: De Stijl
        description:
          "Absolute abstraction reduced to horizontal and vertical lines, right angles, and primary colors with black,
          white, and gray. Inspired by Mondrian's neoplasticism.

          "
        design_system_parameters:
          color_palette_type: primary red, blue, yellow with black/white/gray
          typography_family: geometric sans-serif, uppercase emphasis
          border_radii: 0px (all right angles)
          spacing_scale: grid-locked, proportional rectangles
          shadow_model: none
          texture_grain: none
          layout_philosophy: asymmetric balance of colored rectangles on strict grid
        figma_implementation:
          component_notes:
            "Rectangular frames with thick black strokes as dividers. No rounded corners anywhere. Auto-layout
            with variable-width cells colored by primary palette tokens.

            "
          style_library_tips:
            "Stroke weight tokens are critical (2px, 4px, 8px tiers). Color tokens limited to exactly 6 values.
            Layout components should be fully rectangular with no curves.

            "
        rive_motion:
          animation_curves: linear slides, right-angle direction changes
          interaction_patterns: panel slide and resize, grid reflow
          state_machine_notes: grid reconfiguration states, strict rectilinear motion paths
