      - id: surrealism
        name: Surrealism
        description:
          "Dreamlike juxtapositions of impossible or irrational imagery, melting forms, and disorienting spatial relationships.
          Explores subconscious symbolism with unsettling beauty.

          "
        design_system_parameters:
          color_palette_type: desaturated earth tones with surreal accent pops
          typography_family: serif body with unexpected display disruptions
          border_radii: variable — warped/distorted edges
          spacing_scale: intentionally irregular, disorienting
          shadow_model: exaggerated perspective shadows, impossible light sources
          texture_grain: smooth gradients with hyperreal detail patches
          layout_philosophy: deliberate spatial disruption, broken grid
        figma_implementation:
          component_notes:
            "Mask layers with warped vector paths for dreamlike clipping. Z-index layering to create impossible
            overlaps. Components should include distortion variants.

            "
          style_library_tips:
            "Gradient styles with unusual color transitions. Effect styles for perspective distortion. Keep
            a rational base grid but allow deliberate violations.

            "
        rive_motion:
          animation_curves: slow dreamlike ease, unexpected accelerations
          interaction_patterns: morphing shapes, impossible physics, melting transitions
          state_machine_notes: non-linear state transitions, randomized blend trees
        generative_ai:
