        - ambient
        - confrontational
        - restrained
        - chaotic
  soft:
    - style_a: glassmorphism
      style_b: dark-mode-ui
      condition: Works if glassmorphism panels use dark-tinted translucency over a controlled dark gradient background.
      compromise:
        Limit glassmorphism to overlays/modals with predictable dark background beneath; ensure luminous borders remain
        visible.
    - style_a: flat-design
      style_b: isometric
      condition: Works if isometric elements are treated as illustration content within a flat UI framework.
      compromise: Keep UI chrome flat; use isometric only for hero illustrations and explanatory graphics, not interactive elements.
    - style_a: constructivism
      style_b: duotone
      condition: Works if the duotone pair matches constructivism's limited red-black-white palette.
      compromise: Restrict duotone to red-and-black or red-and-white pairs; apply only to photographic hero elements.
    - style_a: vaporwave
      style_b: aurora-ui
      condition: Works if aurora gradients are shifted to vaporwave's pink-teal spectrum and retro UI chrome is preserved.
      compromise: Use aurora-style gradients as backgrounds but overlay with retro window chrome and vaporwave typography.
    - style_a: woodcut
      style_b: flat-design
      condition: Works if woodcut is confined to illustration assets while UI components remain flat.
      compromise: Woodcut illustrations as spot art within flat-design card components; don't apply woodcut texture to UI chrome.
    - style_a: surrealism
      style_b: swiss-international
      condition: Works if surrealism is limited to hero imagery while all UI grid structure follows Swiss principles.
      compromise:
        Strict Swiss grid and typography for navigation/content; surrealist imagery contained within grid-aligned
        image modules.
    - style_a: claymorphism
      style_b: material-design
      condition: Works if claymorphism's inner shadows replace Material's elevation shadows for playful product variants.
      compromise:
        Use Material's systematic spacing and component structure but swap shadow model from elevation to clay-style
        inner shadow.
    - style_a: retro-vintage-print
      style_b: dark-mode-ui
      condition: Works if vintage textures are adapted to dark backgrounds and aged-paper becomes aged-dark-surface.
      compromise:
        Invert vintage texture tonality — dark distressed surfaces instead of light; maintain vintage typography and
        layout on dark base.
    - style_a: pop-art
      style_b: minimalism-fine-art
      condition: Works if pop art elements are isolated to single-image focal points within vast minimalist negative space.
      compromise:
        One bold pop-art element per composition; surrounding space must be completely empty to maintain minimalist
        identity.
    - style_a: afrofuturism
      style_b: scandinavian-minimalism
      condition: Works if Afrofuturism's geometric patterns are distilled to minimal motifs on clean Scandinavian surfaces.
      compromise:
        Reduce cultural pattern density to single-motif accents; use Scandinavian spacing and neutrals as base with
        jewel-tone accent tokens.
    - style_a: psychedelic
      style_b: line-art
      condition: Works if psychedelic coloring is applied to line-art forms, maintaining linework as the structural foundation.
      compromise:
        Use line-art contours filled or stroked with psychedelic gradients; avoid dissolving the line structure into
        pure color field.
    - style_a: analog-film-grain
      style_b: material-design
      condition: Works if film grain is limited to image content while Material UI surfaces remain clean.
      compromise: Apply grain only to photographic content blocks; keep Material cards, buttons, and navigation surfaces grain-free.
    - style_a: neubrutalism
      style_b: flat-design
      condition:
        Works if flat design provides the base component system and neubrutalism adds the thick borders and offset
        shadows as a skin.
      compromise:
        Keep flat design's color system and spacing; overlay neubrutalism's border and shadow treatment on cards and
        buttons only.
    - style_a: liquid-glass
      style_b: bento-ui
      condition: Works if glass panels are individual bento cells with controlled backgrounds beneath each cell.
      compromise:
        Each bento cell gets its own solid or gradient background — glass effect only on the cell surface, not spanning
        multiple cells.
    - style_a: solarpunk
      style_b: wireframe-mesh
      condition: Works when wireframe mesh represents the technology layer and solarpunk provides the nature layer.
      compromise: "Split visual language: wireframe for data/tech sections, organic green for content/narrative sections."
    - style_a: deconstructivism
      style_b: swiss-international
      condition: Works if Swiss grid provides the underlying structure that deconstructivism then deliberately violates.
      compromise: Establish a clear grid first, then break it with intention — the grid must be legible even in its broken state.
    - style_a: tactile-craft-digital
      style_b: flat-design
      condition: Works if craft textures are confined to illustrations/accents while UI components remain flat and functional.
      compromise:
        Buttons, forms, and navigation stay flat and accessible; background textures and decorative elements carry
        the craft aesthetic.
    - style_a: y2k-revival
      style_b: glassmorphism
      condition:
        Works if chrome and iridescent effects are applied to glass panels — Y2K provides the material, glass provides
        the structure.
      compromise:
        Use iridescent/chrome as the color layer visible through glass blur — limit to hero sections and decorative
        panels.
  tag_clash_rules:
    - tag_a: flat
      tag_b: dimensional
      severity: hard
      resolution: ""
    - tag_a: minimalist
      tag_b: maximalist
      severity: hard
      resolution: ""
    - tag_a: clean
      tag_b: noisy
      severity: soft
      resolution: Confine noisy elements to decorative/illustrative zones; keep interactive UI surfaces clean.
    - tag_a: geometric
      tag_b: organic
      severity: soft
      resolution: Use geometric for UI structure and organic for illustration/imagery content.
    - tag_a: monochromatic
      tag_b: polychromatic
      severity: hard
      resolution: ""
    - tag_a: sparse
      tag_b: dense
      severity: soft
      resolution: Apply sparse layout at page level with dense elements contained in bounded card modules.
    - tag_a: retro
      tag_b: futuristic
      severity: soft
      resolution: Frame as retro-futurism — use retro materials and surfaces with futuristic forms and concepts.
    - tag_a: hand-drawn
      tag_b: precise
      severity: soft
      resolution: Use hand-drawn for illustration and decoration; maintain precision in typography and layout grid.
    - tag_a: translucent
      tag_b: opaque
      severity: soft
      resolution: Layer translucent elements over opaque base surfaces; don't mix transparency models within the same component.
    - tag_a: warm
      tag_b: cool
      severity: soft
      resolution: Use one as dominant and the other as accent; avoid equal balance which reads as undecided.
    - tag_a: angular
      tag_b: curvilinear
      severity: hard
      resolution: ""
    - tag_a: lo-fi
      tag_b: hi-fi
      severity: hard
      resolution: ""
    - tag_a: glossy
      tag_b: matte
      severity: soft
      resolution: Assign glossy to interactive/accent elements and matte to background surfaces, or vice versa.
    - tag_a: ordered
      tag_b: chaotic
      severity: hard
      resolution: ""
    - tag_a: static
      tag_b: kinetic
      severity: soft
      resolution: Use kinetic elements sparingly as attention-directors within a predominantly static composition.
    - tag_a: raw
      tag_b: glossy
      severity: hard
      resolution: ""
    - tag_a: tactile
      tag_b: translucent
      severity: hard
      resolution: ""
    - tag_a: editorial
      tag_b: chaotic
      severity: hard
      resolution: ""
    - tag_a: restrained
      tag_b: exuberant
      severity: hard
      resolution: ""
    - tag_a: ambient
      tag_b: confrontational
      severity: hard
      resolution: ""
    - tag_a: modular
      tag_b: chaotic
      severity: soft
      resolution: Use modular grid as containment vessel — chaos happens within individual cells, never across the grid structure.
    - tag_a: ephemeral
      tag_b: precise
      severity: soft
      resolution: Apply precision to layout and typography; confine ephemeral quality to textures, imagery, and animation.
    - tag_a: vernacular
      tag_b: futuristic
      severity: soft
      resolution: Frame as speculative vernacular — local craft traditions projected into future contexts (solarpunk pattern).
implementation:
  anti_slop:
    description:
      "Patterns that mark output as machine-generated template work. These must be actively avoided in every style
      context. Each rule exists because AI code generators statistically converge on these defaults, making all output look
      identical regardless of intent.

      "
    banned_defaults:
      typography:
        - pattern: Inter as the default typeface
          why: statistical mode of every AI code generator — instantly signals 'undesigned'
          fix: select a typeface with character that matches the style's era and mood
        - pattern: Roboto or Open Sans for body text
          why: Google Fonts popularity bias in training data
          fix: use the style's own typography_family recommendation
        - pattern: "#000000 pure black for body text"
          why: too harsh for screens — fatigues eyes and flattens hierarchy
          fix: "off-black (#111111, #1a1a1a, #2F3437) or style-appropriate dark tone"
        - pattern: uniform font-weight across all text
          why: destroys typographic hierarchy — everything looks equally important
          fix: "minimum three weight tiers (display: 700+, body: 400, secondary: 300-400)"
      color:
        - pattern: purple-to-blue gradient on white background
          why: the single most overused AI-generated color scheme
          fix: derive palette from the style's color_palette_type, not from Tailwind defaults
        - pattern: oversaturated accent colors at full brightness
          why: vibrates against neutrals, looks unprofessional
          fix: desaturate accents 15-30% to blend with the palette's neutral base
        - pattern: evenly distributed rainbow palettes
          why: reads as 'no decision was made' — one dominant color with sharp accents outperforms
          fix: 60/30/10 ratio — dominant surface, secondary structure, accent spark
      shadows:
        - pattern: Tailwind default shadow-md, shadow-lg, shadow-xl
          why: generic depth that belongs to no style — every AI app looks identically 'floaty'
          fix: derive shadow model from style's shadow_model field — many styles use none
        - pattern: pure black rgba(0,0,0,x) shadows everywhere
          why: unnatural — real shadows carry the hue of their environment
          fix: tint shadows with the dominant background hue at low saturation
      layout:
        - pattern: centered single-column with max-w-4xl for everything
          why: safe but forgettable — the 'blog post' layout regardless of content type
          fix: let the style's layout_philosophy drive structure — asymmetric, grid, organic, etc.
        - pattern: identical card grids with uniform sizing
          why: Pinterest/dashboard homogeneity — nothing has visual priority
          fix: vary card sizes to create hierarchy — bento grids, masonry, or featured+supporting
        - pattern: hero section → three-column features → testimonials → CTA footer
          why: the skeleton of every AI-generated landing page
          fix: restructure around the style's spatial logic and the content's actual narrative
      motion:
        - pattern: linear easing on all transitions
          why: robotic — nothing in the physical world moves linearly
          fix: spring physics or style-appropriate curve from rive_motion.animation_curves
        - pattern: all elements appearing simultaneously on page load
          why: overwhelming, no narrative pacing
          fix: "stagger entry — animation-delay: calc(var(--index) * 60-100ms)"
        - pattern: hover effects that only change opacity or color
          why: missed opportunity for tactile feedback
          fix: combine with subtle transform (scale, translateY) matched to style's interaction_patterns
      copy:
        banned_words:
          - Elevate
          - Seamless
          - Unleash
          - Next-Gen
          - Game-changer
          - Delve
          - Cutting-edge
          - Revolutionize
          - Supercharge
          - Empower
        banned_placeholders:
          - Lorem Ipsum
          - John Doe / Jane Doe
          - Acme Corp
          - example@email.com
        rule: use realistic, contextual content that a real user of this style would encounter
    icon_guidance:
      preferred_sets:
        - name: Phosphor Icons
          weight: Bold or Fill — thicker stroke reads as intentional
          why: distinctive without being decorative — works across most styles
        - name: Radix UI Icons
          weight: default
          why: technical precision, good for UI-native and minimalist styles
        - name: Tabler Icons
          weight: 1.5px stroke
          why: extensive set with consistent geometry
      rule: standardize stroke-width globally within a project — mixing weights looks accidental
      override: for styles tagged 'hand-drawn' or 'retro', hand-illustrated icons may replace icon sets entirely
  motion_vocabulary:
    spring_physics:
      css: cubic-bezier(0.16, 1, 0.3, 1)
      framer_motion: "type: 'spring', stiffness: 100, damping: 20"
      feel: premium, weighty, physical
      use_for:
        - interactive elements (buttons, cards, toggles)
        - page transitions
        - modal/sheet reveals
    slow_cinematic:
      css: cubic-bezier(0.25, 0.46, 0.45, 0.94)
      duration: 800ms-1200ms
      feel: dramatic, editorial, contemplative
      use_for:
        - hero reveals
        - full-page transitions
        - photography-heavy layouts
    mechanical_snap:
      css: cubic-bezier(0.77, 0, 0.175, 1)
      duration: 150ms-300ms
      feel: precise, industrial, no-nonsense
      use_for:
        - brutalist/constructivist interfaces
        - toggle states
        - grid reconfigurations
    organic_drift:
      css: cubic-bezier(0.37, 0, 0.63, 1)
      duration: 2000ms-20000ms (ambient loops)
      feel: natural, meditative, atmospheric
      use_for:
        - background gradient movement
        - parallax layers
        - wabi-sabi / impressionist contexts
    playful_bounce:
      css: cubic-bezier(0.34, 1.56, 0.64, 1)
      duration: 400ms-600ms
      feel: energetic, toy-like, joyful
      use_for:
        - claymorphism squish
        - memphis/pop interactions
        - gamified elements
    stutter_glitch:
      css: steps(4, jump-both)
      duration: 100ms-300ms, randomized
      feel: broken, lo-fi, digital artifact
      use_for:
        - glitch art interfaces
        - vaporwave transitions
        - pixel art frame-stepping
    scroll_entry:
      implementation: IntersectionObserver (never window.addEventListener('scroll'))
      default_transform: "translateY(16px) + opacity: 0 → resolved"
      stagger_formula: "animation-delay: calc(var(--index) * 80ms)"
      performance: animate only transform and opacity — never layout-triggering properties
  component_patterns:
    - pattern_id: bento-grid
      name: Asymmetric Bento Grid
      description: variable-sized tiles in CSS Grid creating visual hierarchy through size, not just content
      css_hint: "grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)) with span-2 featured items"
      works_with_tags:
        - geometric
        - ordered
        - precise
        - clean
      breaks_convention: rejects the equal-card grid that makes everything equally unimportant
    - pattern_id: spotlight-border
      name: Cursor-Tracking Spotlight Border
      description: card border that illuminates dynamically under the cursor position
      implementation: radial-gradient on border-image following pointer coordinates
      works_with_tags:
        - futuristic
        - dimensional
        - glossy
      breaks_convention: adds interactivity to what is usually a static decorative element
    - pattern_id: parallax-card-stack
      name: Scroll-Driven Card Stack
      description: sections that stick and physically stack over each other during scroll
      implementation: "position: sticky with incrementing z-index and slight scale reduction"
      works_with_tags:
        - dimensional
        - dense
        - ordered
      breaks_convention: vertical space becomes a physical dimension rather than just sequence
    - pattern_id: text-mask-reveal
      name: Typography as Window
      description: large text acting as a clipping mask to video or animated imagery behind it
      implementation: "background-clip: text with video/animation background"
      works_with_tags:
        - maximalist
        - abstract
        - kinetic
      breaks_convention: text becomes a viewport rather than content — inverts the reading hierarchy
    - pattern_id: split-scroll
      name: Opposing Scroll Halves
      description: two screen halves sliding in opposite directions
      implementation: CSS scroll-snap with inverted translateY on alternating columns
      works_with_tags:
        - asymmetric
        - futuristic
        - dense
      breaks_convention: rejects the assumption that all content moves in one direction
    - pattern_id: grain-overlay
      name: Fixed Noise/Grain Texture
      description: full-viewport noise texture that breaks digital flatness
      implementation: "position: fixed, pointer-events: none, mix-blend-mode: overlay, opacity: 0.03-0.06"
      works_with_tags:
        - textured
        - noisy
        - retro
        - organic
      breaks_convention: adds analog imperfection to a digital medium — fights the uncanny smoothness of CSS
    - pattern_id: tinted-shadows
      name: Hue-Matched Colored Shadows
      description: shadows carry the hue of the element or background rather than generic black
      implementation: box-shadow using hsla() derived from the element's background-color
      works_with_tags:
        - dimensional
        - warm
        - cool
        - saturated
      breaks_convention: replaces the universal black shadow that flattens color relationships
    - pattern_id: curtain-reveal
      name: Horizontal Curtain Part on Scroll
      description: hero section splitting horizontally like curtains as user scrolls
      implementation: two absolute-positioned halves with scroll-driven translateX
      works_with_tags:
        - kinetic
        - maximalist
        - dimensional
      breaks_convention: the hero is not a static billboard — it has a physical opening gesture
    - pattern_id: variable-font-morph
      name: Continuous Font Weight/Width Animation
      description: variable font axes interpolated on scroll or hover for living typography
      implementation: font-variation-settings animated via CSS custom properties
      works_with_tags:
        - kinetic
        - futuristic
        - organic
      breaks_convention: typography is usually static — this makes it a dynamic material
    - pattern_id: inner-refraction-glass
      name: True Glassmorphism with Edge Refraction
      description: "beyond backdrop-filter: blur — adds 1px inner border and inner shadow simulating glass edge light"
      implementation: "backdrop-filter: blur(12px) + inset box-shadow + 1px rgba white border"
      works_with_tags:
        - translucent
        - dimensional
        - glossy
        - cool
      breaks_convention: most glassmorphism is just blur — the refraction edge is what makes it feel like real glass
  style_profiles:
    - style_id: art-deco
      dials:
        design_variance: 5
        motion_intensity: 4
        visual_density: 5
      font_selection:
        display: "'Poiret One', 'Josefin Sans', 'Didot', serif"
        body: "'DM Sans', 'Satoshi', sans-serif"
        override_rule: never use rounded/organic typefaces — geometry is identity
      motion_signature: slow_cinematic
      premium_patterns:
        - spotlight-border
        - parallax-card-stack
      convention_breaks:
        - dogma: Art Deco must use gold and black
          break:
            platinum/silver + deep navy creates equally authentic Deco without the cliché — Streamline Moderne was chrome,
            not gold
        - dogma: Art Deco is only for luxury brands
          break:
            Deco's geometric rhythm works for data dashboards and technical UIs — the Chrysler Building's lobby is information
            architecture
      audience_market_fit:
        strong:
          - luxury SaaS
          - premium fintech
          - editorial platforms
          - high-end hospitality
        unexpected:
          - developer API docs (the geometric rigor maps to structured information)
          - music production tools (the 1920s-30s jazz connection)
    - style_id: impressionism
      dials:
        design_variance: 6
        motion_intensity: 3
        visual_density: 2
      font_selection:
        display: "'Cormorant Garamond', 'Playfair Display', serif"
        body: "'Source Serif 4', 'Lora', serif"
        override_rule: serif everywhere — this is a painting, not a dashboard
      motion_signature: organic_drift
      premium_patterns:
        - grain-overlay
        - variable-font-morph
      convention_breaks:
        - dogma: impressionism only works for art galleries and wellness
          break:
            the luminous, atmospheric quality works for weather apps, ambient computing UIs, and smart home environments
            — anywhere sensing 'atmosphere' is the product
        - dogma: painterly means imprecise interactions
          break:
            crisp interaction targets can sit on impressionist backgrounds — the contrast between precise UI chrome and soft
            backgrounds creates sophistication
      audience_market_fit:
        strong:
          - wellness/mindfulness apps
          - gallery/museum platforms
          - lifestyle editorial
        unexpected:
          - smart home controls (light/atmosphere is the product)
          - environmental monitoring dashboards (data as landscape)
    - style_id: constructivism
      dials:
        design_variance: 9
        motion_intensity: 5
        visual_density: 8
      font_selection:
        display: "'Bebas Neue', 'Oswald', sans-serif"
        body: "'Space Grotesk', 'IBM Plex Sans Condensed', sans-serif"
        override_rule: condensed weights mandatory — wide-set type kills the energy
      motion_signature: mechanical_snap
      premium_patterns:
        - split-scroll
        - text-mask-reveal
      convention_breaks:
        - dogma: constructivism is only for political or activist contexts
          break:
            the diagonal energy and information density are perfect for sports analytics, logistics dashboards, and competitive
            gaming UIs
        - dogma: red, black, and white only
          break: swap red for electric orange or signal yellow to retain the urgency while escaping Soviet cosplay
      audience_market_fit:
        strong:
          - activism platforms
          - editorial/news
          - event branding
        unexpected:
          - esports analytics (the aggressive hierarchy matches competitive intensity)
          - construction/logistics management (the industrial origin is literal)
    - style_id: art-nouveau
      dials:
        design_variance: 6
        motion_intensity: 4
        visual_density: 5
      font_selection:
        display: "'Italianno', 'Tangerine', cursive"
        body: "'Lora', 'Crimson Pro', serif"
        override_rule: at least one typeface must have swash or alternate glyph features
      motion_signature: organic_drift
      premium_patterns:
        - variable-font-morph
        - inner-refraction-glass
      convention_breaks:
        - dogma: Art Nouveau is only for decorative/wedding contexts
          break:
            the organic curve logic maps directly to data visualization — sinuous line charts, flow diagrams, and network
            graphs are Art Nouveau's native language
        - dogma: ornament means visual clutter
          break: ornamental borders as functional navigation rails — the vine becomes the sidebar
      audience_market_fit:
        strong:
          - luxury e-commerce
          - botanical/garden brands
          - boutique hospitality
        unexpected:
          - biotech data visualization (organic forms for organic data)
          - audio waveform editors (curves are the content)
    - style_id: bauhaus
      dials:
        design_variance: 4
        motion_intensity: 2
        visual_density: 4
      font_selection:
        display: "'DM Sans', 'Futura PT', sans-serif"
        body: "'DM Sans', sans-serif"
        override_rule: one typeface only, max 3 weights — this is the point
      motion_signature: mechanical_snap
      premium_patterns:
        - bento-grid
      convention_breaks:
        - dogma: Bauhaus must use primary colors
          break:
            Albers' color theory was about relative perception, not about being limited to red/blue/yellow — a Bauhaus system
            in warm earth tones is philosophically coherent
        - dogma: Bauhaus is austere and unfriendly
          break:
            the systematic approach produces some of the most accessible interfaces — clear hierarchy, predictable structure,
            no ambiguity
      audience_market_fit:
        strong:
          - design system documentation
          - education platforms
          - icon/component libraries
        unexpected:
          - children's learning apps (the shapes-as-primitives language is actually pre-literate-friendly)
          - accessibility-first products (the systematic clarity is a feature, not a limitation)
    - style_id: de-stijl
      dials:
        design_variance: 5
        motion_intensity: 2
        visual_density: 5
      font_selection:
        display: "'Space Grotesk', 'Archivo', sans-serif"
        body: "'Space Grotesk', sans-serif"
        override_rule: uppercase for headings, no italics anywhere
      motion_signature: mechanical_snap
      premium_patterns:
        - bento-grid
        - split-scroll
      convention_breaks:
        - dogma: only primary colors are permitted
          break:
            the compositional principle (asymmetric rectangles with thick black dividers) works with any restricted palette
            — try it with a forest/sage palette for a natural De Stijl
        - dogma: too abstract to be usable
          break: every CSS Grid layout is a De Stijl composition — it's the native language of the web
      audience_market_fit:
        strong:
          - abstract brand identity
          - architecture portfolios
          - design tool UIs
        unexpected:
          - kanban boards and project management (the rectangular block structure is literally task cards)
          - calendar/scheduling apps (time blocks are Mondrian rectangles)
    - style_id: rococo
      dials:
        design_variance: 7
        motion_intensity: 5
        visual_density: 7
      font_selection:
        display: "'Playfair Display', 'Cormorant Garamond', serif"
        body: "'EB Garamond', 'Crimson Pro', serif"
        override_rule: serifs are mandatory — sans-serif kills the style dead
      motion_signature: playful_bounce
      premium_patterns:
        - spotlight-border
        - curtain-reveal
      convention_breaks:
        - dogma: Rococo is too ornate for digital
          break:
            the ornamental density is what makes luxury e-commerce feel luxurious — Rococo at 40% intensity is what every
            'premium' site is trying to be
        - dogma: pastels are weak and infantile
          break:
            Rococo pastels with precise typography create visual authority through confidence in softness — the opposite
            of 'trying too hard'
      audience_market_fit:
        strong:
          - luxury fashion
          - wedding/event platforms
          - fine dining
        unexpected:
          - AI/ML experiment playgrounds (the playful excess matches generative exploration)
          - creative brief tools (ornament as creative permission)
    - style_id: surrealism
      dials:
        design_variance: 10
        motion_intensity: 7
        visual_density: 4
      font_selection:
        display: "'Instrument Serif', 'Newsreader', serif"
        body: "'Syne', 'Cabinet Grotesk', sans-serif"
        override_rule: mix serif display with sans-serif body — the typographic disconnect is the point
      motion_signature: organic_drift
      premium_patterns:
        - text-mask-reveal
        - curtain-reveal
        - variable-font-morph
      convention_breaks:
        - dogma: surrealism is only for art portfolios
          break:
            the spatial disorientation is perfect for onboarding flows that need to break mental models — if you're teaching
            users a new paradigm, a surreal environment says 'forget what you know'
        - dogma: irrational layouts hurt usability
          break: surreal image placement with rational text structure creates a gallery-with-captions pattern that is highly scannable
      audience_market_fit:
        strong:
          - creative agency portfolios
          - album/music visuals
          - editorial illustration
        unexpected:
          - mental health apps (the dreamlike quality can safely externalize internal experience)
          - paradigm-shifting product launches (disorientation as deliberate framing)
    - style_id: pop-art
      dials:
        design_variance: 7
        motion_intensity: 6
        visual_density: 8
      font_selection:
        display: "'Bangers', 'Bungee', sans-serif"
        body: "'Outfit', 'Space Grotesk', sans-serif"
        override_rule: display type must be bold/condensed — thin type kills the energy
      motion_signature: playful_bounce
      premium_patterns:
        - bento-grid
        - text-mask-reveal
      convention_breaks:
        - dogma: pop art is only for youth/casual brands
          break:
            financial reports in pop-art style make data memorable — Lichtenstein's dots on a revenue chart are more engaging
            than another gray bar graph
        - dogma: halftone dots are just decoration
          break: halftone density as a data-encoding variable — the dot pattern itself can represent quantitative information
      audience_market_fit:
        strong:
          - social media tools
          - youth branding
          - promotional/event
        unexpected:
          - data journalism (the comic-panel grid is a natural story structure)
          - internal dashboards that need to be engaging enough for non-analysts to use
    - style_id: minimalism-fine-art
      dials:
        design_variance: 3
        motion_intensity: 1
        visual_density: 1
      font_selection:
        display: "'Instrument Serif', 'Newsreader', serif"
        body: "'Geist Sans', 'Switzer', sans-serif"
        override_rule: maximum two typefaces, two weights — subtract before adding
      motion_signature: slow_cinematic
      premium_patterns:
        - variable-font-morph
      convention_breaks:
        - dogma: minimalism means boring / empty
          break:
            the vast negative space creates tension — what isn't there becomes the dominant visual element, and that tension
