      - id: pop-art
        name: Pop Art
        description:
          "High-saturation, flat color fields with bold outlines, Ben-Day dots, and mass-culture imagery. Celebrates
          commercial aesthetic with ironic detachment.

          "
        design_system_parameters:
          color_palette_type: fully saturated primaries and secondaries, CMYK pops
          typography_family: bold condensed sans-serif or comic lettering
          border_radii: 0–4px (mostly sharp)
          spacing_scale: tight, poster-like density
          shadow_model: offset hard shadow in contrasting color
          texture_grain: halftone Ben-Day dot overlay
          layout_philosophy: comic-panel grid, bold compartmentalization
        figma_implementation:
          component_notes:
            "Card components with thick black stroke and offset color shadow. Halftone pattern fills as reusable
            image styles. Comic-panel grid layout with gutter tokens.

            "
          style_library_tips:
            "6–8 fully saturated color tokens. Halftone dot pattern as a repeatable fill style. Stroke weight
