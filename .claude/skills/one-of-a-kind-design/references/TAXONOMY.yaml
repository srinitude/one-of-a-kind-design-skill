          typography_family: thin, restrained sans-serif or minimal CJK type
          border_radii: 0px or material-derived (smooth for glass, sharp for steel)
          spacing_scale: vast negative space — materials exist in emptiness
          shadow_model: natural material-contact shadow only
          texture_grain: material surface texture — stone grain, steel brush marks, wood grain
          layout_philosophy: extreme negative space with singular material-form focus
        figma_implementation:
          component_notes:
            "Single-element compositions within vast empty frames. Material texture fills cropped to simple geometric
            shapes. No decorative elements — only the 'thing' and the space around it.

            "
          style_library_tips:
            "Material texture set (stone, steel, glass, paper, wood). Extreme spacing tokens (128px, 192px,
            256px). Minimal color tokens — derived from material photographs.

            "
        rive_motion:
          animation_curves: near-imperceptible drift, meditative pacing
          interaction_patterns: material surface focus shift, parallax revealing material depth
          state_machine_notes: contemplation states with very long transitions (2-4 seconds)
        generative_ai:
          positive_prompt:
            Mono-ha art, raw materials, stone steel glass wood, unaltered materials in space, Japanese post-minimalism,
            material encounter, vast emptiness
          negative_prompt: busy, colorful, decorative, digital, ornate, complex, multiple objects
