    styles:
      - id: art-deco
        name: Art Deco
        description:
          "Luxurious geometric ornamentation with bold symmetry, metallic accents, and strong vertical lines. Draws
          from 1920s–1930s architecture, fashion, and industrial design.

          "
        design_system_parameters:
          color_palette_type: jewel tones with gold and black accents
          typography_family: geometric display serif or high-contrast sans-serif
          border_radii: 0px (sharp corners, chamfered edges)
          spacing_scale: moderate, rhythmic repetition
          shadow_model: hard drop shadows or metallic bevel
          texture_grain: none or subtle metallic sheen
          layout_philosophy: strict bilateral symmetry on vertical axis
        figma_implementation:
          component_notes:
            "Use auto-layout with center alignment and fixed padding. Create decorative border components as reusable
            frames with stroke patterns. Leverage boolean properties for ornament toggles.

            "
          style_library_tips:
            "Define gold/brass gradient fills as reusable styles. Set up geometric border token variants. Typography
            styles should include a display tier with generous letter-spacing.

            "
        rive_motion:
          animation_curves: ease-in-out with slight overshoot, regal pacing
          interaction_patterns: reveal animations along vertical axis, shimmer on hover
          state_machine_notes: binary reveal states, smooth gold-highlight transitions
        generative_ai:
          positive_prompt:
            art deco style, geometric ornament, gold and black, 1920s glamour, symmetrical, luxurious, Chrysler
            Building aesthetic, bold lines
          negative_prompt: organic shapes, rough texture, hand-drawn, messy, muted colors, asymmetric
          recommended_image_models:
            - Flux 2 Pro (Black Forest Labs)
            - GPT Image 1 (OpenAI)
            - Midjourney
            - Flux Kontext Max (Black Forest Labs)
            - Nano Banana (Gemini 2.5 Flash)
