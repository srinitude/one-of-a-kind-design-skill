pairings:
  recommended:
    - style_a: swiss-international
      style_b: glassmorphism
      rationale:
        Swiss grid discipline provides structure for glassmorphism's translucent panels, preventing visual chaos while
        maintaining modern ethereal quality.
      shared_or_complementary_tags:
        - clean
        - precise
        - minimalist
    - style_a: art-deco
      style_b: dark-mode-ui
      rationale:
        Art Deco's gold-on-black palette naturally translates to premium dark mode interfaces with metallic accent
        tokens.
      shared_or_complementary_tags:
        - high-contrast
        - precise
        - opaque
    - style_a: bauhaus
      style_b: flat-design
      rationale:
        Bauhaus principles directly inform flat design's geometric simplicity — combining them creates historically
        grounded modern UI.
      shared_or_complementary_tags:
        - geometric
        - flat
        - clean
        - minimalist
    - style_a: wabi-sabi
      style_b: analog-film-grain
      rationale:
        Both celebrate imperfection and organic texture — film grain provides the photographic voice for wabi-sabi's
        design philosophy.
      shared_or_complementary_tags:
        - textured
        - organic
        - warm
    - style_a: constructivism
      style_b: brutalist-web
      rationale:
