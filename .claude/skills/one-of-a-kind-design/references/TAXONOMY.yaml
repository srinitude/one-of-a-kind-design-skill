      - id: bauhaus
        name: Bauhaus
        description:
          "Radical simplification using primary colors, basic geometric shapes (circle, square, triangle), and sans-serif
          typography. Function dictates form with no superfluous decoration.

          "
        design_system_parameters:
          color_palette_type: primary red, blue, yellow plus black and white
          typography_family: geometric sans-serif (Futura, DIN, or similar)
          border_radii: 0px or 50% (circle), no in-between
          spacing_scale: moderate, mathematically proportioned
          shadow_model: none
          texture_grain: none (clean and flat)
          layout_philosophy: strict modular grid with mathematical proportions
        figma_implementation:
          component_notes:
            "Highly systematic component sets with strict size constraints. Auto-layout with fixed gaps. Shape
            primitives as first-class design tokens (circle, square, triangle icon set).

            "
          style_library_tips:
            "Five-color palette only. Typography limited to one family at 2–3 weights. Grid columns should follow
            golden ratio or Fibonacci spacing.

            "
        rive_motion:
          animation_curves: linear or simple ease-in-out, no bounce
          interaction_patterns: geometric transformation — rotate, scale, translate
          state_machine_notes: deterministic state transitions with no randomness
        generative_ai:
          positive_prompt:
            Bauhaus style, primary colors, geometric shapes, circle square triangle, clean composition, modernist,
            functional, Herbert Bayer, Josef Albers
          negative_prompt: ornate, decorative, organic, textured, pastel, complex, photorealistic
