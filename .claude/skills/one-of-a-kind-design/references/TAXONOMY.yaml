      - id: art-nouveau
        name: Art Nouveau
        description:
          "Flowing, whiplash curves inspired by natural forms — vines, flowers, insects. Rich ornamentation with sinuous
          line work and muted organic palettes.

          "
        design_system_parameters:
          color_palette_type: muted greens, golds, dusty rose, sage
          typography_family: decorative serif with swash alternates
          border_radii: variable organic curves, no uniform radius
          spacing_scale: moderate with ornamental breathing room
          shadow_model: subtle inner shadows for embossed effect
          texture_grain: subtle linen or parchment
          layout_philosophy: organic flow guided by curvilinear borders
        figma_implementation:
          component_notes:
            "Vector-based decorative borders as sliceable components. Use mask layers for organic clipping. Swash
            typography requires OpenType feature toggling in text styles.

            "
          style_library_tips:
            "Store ornamental vine and frame vectors as reusable component sets. Color variables should include
            a muted tier and a metallic accent tier.

            "
        rive_motion:
          animation_curves: slow sinusoidal ease, organic overshoot
          interaction_patterns: vine/tendril growth on hover, bloom reveals
          state_machine_notes: smooth blend states for organic growth sequences
        generative_ai:
          positive_prompt:
            art nouveau style, flowing organic curves, Mucha illustration, whiplash lines, floral ornamentation,
            stained glass, decorative border, muted palette
          negative_prompt: angular, geometric, flat design, minimalist, brutalist, neon, digital
