audience_routes:
  by_industry:
    - industry: fintech / banking
      primary_styles:
        - material-design
        - dark-mode-ui
        - bento-ui
        - swiss-international
      avoid_styles:
        - psychedelic
        - memphis-design
        - glitch
        - pixel-art
      rationale: Trust, clarity, and data density are non-negotiable. Avoid anything that signals imprecision or play.
    - industry: luxury / fashion
      primary_styles:
        - art-deco
        - cinematic
        - minimalist-maximalism
        - editorial-minimalism
      avoid_styles:
        - flat-design
        - material-design
        - pixel-art
        - claymorphism
      rationale: Premium perception requires editorial restraint or dramatic excess — never default SaaS patterns.
    - industry: children / education
      primary_styles:
        - claymorphism
        - papercut
        - isometric
        - tactile-craft-digital
      avoid_styles:
        - brutalist-web
        - constructivism
        - dark-mode-ui
        - deconstructivism
      rationale: Approachability, warmth, and clarity. Avoid anything confrontational or spatially disorienting.
    - industry: developer tools
      primary_styles:
        - dark-mode-ui
        - wireframe-mesh
        - bento-ui
        - flat-design
      avoid_styles:
        - rococo
        - art-nouveau
        - psychedelic
        - impressionism
      rationale: Information density, monospace typography, and reduced visual noise. Serif and ornament are alien.
    - industry: sustainability / climate
      primary_styles:
        - solarpunk
        - wabi-sabi
        - scandinavian-minimalism
        - resonant-stark
      avoid_styles:
        - y2k-revival
        - vaporwave
        - pop-art
        - hdr-hyperrealism
      rationale: Material honesty and nature connection. Avoid synthetic, nostalgic, or hyper-processed aesthetics.
    - industry: music / entertainment
      primary_styles:
        - psychedelic
        - vaporwave
        - glitch
        - afrofuturism
        - cinematic
      avoid_styles:
        - swiss-international
        - material-design
        - editorial-minimalism
      rationale: Expressive, immersive, personality-driven. Rational/systematic styles suppress creative energy.
    - industry: healthcare / wellness
      primary_styles:
        - scandinavian-minimalism
        - resonant-stark
        - wabi-sabi
        - flat-design
      avoid_styles:
        - glitch
        - brutalist-web
        - constructivism
        - psychedelic
      rationale: Calm, trustworthy, accessible. Avoid visual aggression, disorientation, or motion-heavy patterns.
    - industry: creator economy / indie SaaS
      primary_styles:
        - neubrutalism
        - bento-ui
        - editorial-minimalism
        - pop-art
      avoid_styles:
        - rococo
        - art-deco
        - skeuomorphism
        - hdr-hyperrealism
      rationale: Personality and differentiation over polish. Show character, not luxury.
  by_audience_age:
    - segment: Gen Z (18-28)
      resonant_styles:
        - y2k-revival
        - neubrutalism
        - vaporwave
        - claymorphism
        - pixel-art
      anti_patterns: Avoid anything that reads as 'corporate' — Material Design, Swiss International, and generic SaaS styling.
    - segment: Millennials (29-44)
      resonant_styles:
        - editorial-minimalism
        - bento-ui
        - dark-mode-ui
        - scandinavian-minimalism
        - analog-film-grain
      anti_patterns: Avoid both hyper-youth aesthetics (pixel art, Y2K) and over-formal luxury (Rococo, full Art Deco).
    - segment: Gen X / Boomers (45+)
      resonant_styles:
        - swiss-international
        - flat-design
        - material-design
        - studio-product
        - cinematic
      anti_patterns: Avoid low-contrast styles (neomorphism), chaotic layouts (deconstructivism), and motion-heavy patterns.
universal_guardrails:
  accessibility_non_negotiables:
    - rule: Text contrast ratio must meet WCAG 2.2 AA minimum (4.5:1 normal, 3:1 large) in ALL styles, no exceptions
      styles_at_risk:
        - neomorphism
        - glassmorphism
        - liquid-glass
        - aurora-ui
    - rule: All animation must respect prefers-reduced-motion — wrap in @media query or provide toggle
      styles_at_risk:
        - psychedelic
        - glitch
        - particle-systems
        - vaporwave
    - rule: No content conveyed through color alone — always pair with shape, icon, or text label
      styles_at_risk:
        - duotone
        - de-stijl
        - pop-art
        - bauhaus
    - rule: Focus indicators must be visible in all interactive states — never suppress outline
      styles_at_risk:
        - neomorphism
        - glassmorphism
        - brutalist-web
    - rule: No flashing content exceeding 3 per second — seizure trigger
      styles_at_risk:
        - glitch
        - psychedelic
        - vaporwave
        - pixel-art
  anti_slop_rules:
    - rule: Never combine more than 2 styles from the same category — cross-category pairing creates distinction
      severity: strong recommendation
    - rule: Never apply a style purely as skin over generic layout — the style must inform spatial composition
      severity: mandatory
    - rule: Every font choice must be justified by the style's typographic architecture — no default system fonts
      severity: mandatory
    - rule: Shadows must be style-appropriate — do not add Material Design elevation to Art Deco components
      severity: hard conflict
    - rule: Animation curves must match the style's motion personality — no spring physics on Swiss International
      severity: hard conflict
    - rule: Color palettes must be internally consistent — do not mix Art Deco jewel tones with Scandinavian pastels
      severity: hard conflict
    - rule: If two selected styles share fewer than 1 tag, check the conflict map before proceeding
      severity: automated check
    - rule: Texture grain and translucency are mutually exclusive surface treatments — pick one per element
      severity: hard conflict
  performance_guardrails:
    - rule: "Limit simultaneous backdrop-filter: blur() elements to 3-4 on screen"
      affected_styles:
        - glassmorphism
        - liquid-glass
        - aurora-ui
    - rule: Animate only transform and opacity — never layout-triggering properties
      affected_styles:
        - all styles with motion
    - rule: Use will-change sparingly — apply only to actively animating elements, remove after
      affected_styles:
        - particle-systems
        - generative-art
        - noise-field
    - rule: Texture overlays must be optimized — maximum 200KB per full-screen texture asset
      affected_styles:
        - wabi-sabi
        - analog-film-grain
        - risograph
        - arte-povera-digital
        - tactile-craft-digital
    - rule: Particle systems must cap at 200 active particles on mobile, 500 on desktop
      affected_styles:
        - particle-systems
        - generative-art
