      - id: minimalism-fine-art
        name: Minimalism (Fine Art)
        description:
          "Extreme reduction to essential geometric forms, monochrome or severely limited palettes, and vast negative
          space. Seeks to eliminate all external reference and expression.

          "
        design_system_parameters:
          color_palette_type: monochromatic or 2-color maximum
          typography_family: thin geometric sans-serif
          border_radii: 0px or consistent small value (4px)
          spacing_scale: extremely generous / vast white space
          shadow_model: none
          texture_grain: none
          layout_philosophy: extreme negative space, single focal element
        figma_implementation:
          component_notes:
            "Ultra-sparse layouts with single-element focus. Auto-layout containers with large fixed padding values.
            Minimal component variants — reduce to absolute essentials.

            "
          style_library_tips:
            "2–3 color tokens maximum. One typeface, two weights. Spacing scale should have a dramatically large
            upper tier (64px, 128px).

            "
        rive_motion:
          animation_curves: slow linear, near-imperceptible ease
          interaction_patterns: subtle opacity shifts, restrained scale
          state_machine_notes: minimal states, long transitions, contemplative pacing
        generative_ai:
          positive_prompt:
            minimalist art, vast negative space, geometric reduction, monochrome, Donald Judd, Agnes Martin, essential
            forms, clean, contemplative
          negative_prompt: busy, ornate, colorful, textured, detailed, complex, chaotic, photorealistic
