  svg_models:
    description: >-
      SVG generation models accessed via QuiverAI API (NOT fal.ai). Used for all vector
      graphics: logos, icons, illustrations, decorative elements, section dividers,
      animatable hero graphics, and raster-to-vector conversion. QuiverAI Arrow is a
      purpose-built SVG generation model producing clean, production-ready vector output.
      SDK: @quiverai/sdk. Auth: Bearer token via QUIVERAI_API_KEY env var.
      Billing: 1 credit per SVG. Rate limit: 20 requests per 60 seconds per organization.
      Docs: https://docs.quiver.ai/
    text_to_svg:
      - model: QuiverAI Arrow (Text-to-SVG)
        provider: QuiverAI
        api: quiverai
        sdk_package: "@quiverai/sdk"
        sdk_method: client.createSVGs.generateSVG()
        rest_endpoint: POST https://api.quiver.ai/v1/svgs/generations
        model_id: arrow-preview
        tier: standard
        strengths: high-quality SVG generation from text prompts with optional reference images and style instructions
        parameters:
          model: "arrow-preview (required)"
          prompt: "string (required) — description of desired SVG"
          instructions: "string (optional) — separate style/formatting guidance"
          references: "array (optional) — up to 4 reference images by URL or base64"
          n: "integer (optional, default 1) — number of outputs (1-16)"
          stream: "boolean (optional, default false) — SSE stream with phases (reasoning, draft, content)"
          temperature: "number (optional, default 1) — randomness (0-2)"
          top_p: "number (optional, default 1) — nucleus sampling (0-1)"
          presence_penalty: "number (optional, default 0) — pattern variety (-2 to 2)"
          max_output_tokens: "integer (optional) — upper bound (1-131072)"
        prompt_best_practices:
          - subject: be specific ("a logo for an eco-friendly coffee company")
          - style: specify aesthetic ("line art", "hand drawn", "duotone", "flat monochrome icon")
          - color_palette: use explicit hex values ("background #e9edc9, logo in #fb8500")
          - composition: include framing ("centered icon", "wide horizontal logo")
          - text_integration: state text clearly ("headline 'URBAN EXPLORER' in bold white sans-serif at top")
        use_in_pipeline: >-
          Generate SVG logos, icons, illustrations, decorative elements, section dividers,
          ornamental borders, and animatable hero graphics for all 66 taxonomy styles.
          SVG output is resolution-independent, CSS-animatable, and smaller than raster for
          graphic/geometric content. Prefer over raster when photorealism is not required.
        per_style_svg_guidance:
          art-deco: >-
            geometric symmetrical ornament, bilateral symmetry, gold #C9A84C and black #1A1A1A,
            stepped zigzag patterns, fan motifs, chamfered corners, metallic gradient fills via
            linearGradient, no rounded corners, Futura-style letterforms
          impressionism: >-
            painterly brush-stroke illustration, soft blended edges, atmospheric color washes,
            muted warm palette, visible stroke texture via SVG filters (feTurbulence + feDisplacementMap),
            no hard outlines, natural light simulation
          constructivism: >-
            aggressive diagonal composition, red #CC0000 + black #000000 + white #FFFFFF + optional
            ochre #CC8800, bold geometric shapes, extreme scale contrast, no curves, no ornament,
            propaganda poster density, condensed sans-serif letterforms
          art-nouveau: >-
            organic flowing curves, vine and floral motifs, whiplash lines via cubic Bezier paths,
            nature-inspired forms, muted sage and gold palette, decorative border frames with
            asymmetric organic growth, Mucha-influenced illustration style
          bauhaus: >-
            circle + square + triangle primitives, primary colors red #FF0000 blue #0000FF yellow #FFFF00
            on white or black, mathematical grid alignment, Futura Bold typography, zero ornament,
            zero texture, flat fills only, golden ratio spacing
          de-stijl: >-
            strict horizontal + vertical grid, primary colors only, thick black #000000 grid lines,
            Mondrian-inspired composition, no diagonals, no curves, rectangular cells filled with
            red #FF0000 blue #0039CB yellow #FFD700 or white
          rococo: >-
            elaborate ornamental scrollwork, C-curves and S-curves, pastel palette with gold accents,
            shell and acanthus leaf motifs, asymmetric cartouche frames, fine line detail,
            pearl-strand border patterns
          surrealism: >-
            impossible juxtapositions, melting or morphing forms, dreamlike subjects, unexpected
            scale relationships, Dalí/Magritte-influenced, clean line rendering of impossible objects,
            subtle gradient backgrounds suggesting infinite depth
          pop-art: >-
            bold outlines 3-4px, Ben-Day dot patterns via SVG pattern fills, saturated primaries
            plus hot pink #FF69B4 and electric blue #0066FF, comic panel composition, halftone
            gradient effects, speech bubble elements, Lichtenstein-influenced
          cinematic: >-
            atmospheric landscape illustrations, film-grain texture via feTurbulence filter,
            wide aspect ratio compositions (21:9), warm/cool color temperature contrast,
            volumetric light rays via gradient opacity, shallow depth simulation
          brutalist-web: >-
            raw monochrome, system-font-style letterforms (Courier, monospace), no decoration,
            thick borders 2-4px, intentionally "ugly" compositions, broken grid, raw HTML aesthetic,
            black + white + one accent color only
          wabi-sabi: >-
            imperfect hand-drawn quality, visible irregularities, muted earth tones (clay #B4654A,
            moss #6B705C, sand #D4C5A9), asymmetric compositions, breathing space, weathered
            texture via noise filters, brush-stroke line quality
          scandinavian-minimalism: >-
            clean geometric icons, ample negative space, muted Nordic palette (soft white #F5F0EB,
            birch #E8DCC8, slate #6B7B8D), thin 1px strokes, rounded terminals, hygge warmth,
            simple nature motifs (leaves, mountains, waves)
          dark-mode-ui: >-
            high-contrast icons on transparent background, luminous accent colors (#00D4FF, #7B61FF),
            subtle glow effects via feGaussianBlur, depth hierarchy through opacity levels,
            crisp geometric shapes, 24px grid alignment
          glassmorphism: >-
            frosted glass panels via feGaussianBlur + opacity, layered translucent shapes,
            subtle border strokes at 0.2 opacity, colorful gradient blobs behind glass layers,
            depth through stacking, aurora-inspired color shifts
          neomorphism: >-
            soft raised/inset surfaces, dual shadow simulation (light + dark offset fills),
            monochromatic palette with 2% hue shifts, rounded shapes, subtle emboss effect,
            matte material feel, minimal color contrast
          isometric: >-
            30-degree isometric grid, flat-shaded 3D objects, three-tone shading per face
            (light/medium/dark), pixel-precise alignment, no perspective distortion, clean
            geometric construction, bright saturated palette
          wireframe-mesh: >-
            exposed grid structure, thin 0.5-1px stroke lines, no fills (stroke-only rendering),
            node points at intersections, topology-revealing construction, monochrome green #00FF00
            or white on dark, matrix/terminal aesthetic
          noise-field: >-
            Perlin/simplex noise visualization via feTurbulence, flowing vector fields rendered
            as aligned short strokes, organic flow patterns, gradient color mapping (cool-warm),
            particle-trail aesthetics, generative/algorithmic feel
          particle-systems: >-
            scattered dot/circle elements at various scales, randomized positions with density
            gradients, connecting lines between nearby particles, constellation-like compositions,
            fade-out at edges, cosmic/molecular feel
          fractal: >-
            self-similar recursive patterns (Sierpinski, Koch, Mandelbrot-inspired), mathematical
            precision, infinite-depth illusion, color gradients mapping iteration depth, fine
            detail at multiple zoom levels, sacred geometry motifs
          generative-art: >-
            algorithmic pattern generation, parameter-driven variation, grid-based compositions
            with controlled randomness, mathematical curves (Lissajous, spirograph), code-art
            aesthetic, systematic color palettes
          glitch: >-
            data corruption artifacts, horizontal scan-line displacement, RGB channel splitting
            via offset colored duplicates, pixel sorting effect (gradient strips), broken grid,
            VHS tracking error aesthetic, neon accent colors
          psychedelic: >-
            kaleidoscopic symmetry, vibrant saturated spectrum colors, op-art illusions,
            concentric radiating patterns, Moiré interference via overlapping fine grids,
            liquid/morphing organic forms, mandala compositions
          vaporwave: >-
            retro 80s/90s aesthetic, pink-purple-cyan gradient (#FF71CE → #B967FF → #01CDFE),
            Greek column/bust motifs, palm tree silhouettes, sunset gradient backgrounds,
            pixel grid overlays, Japanese text elements, chrome/metallic text effects
          solarpunk: >-
            nature-technology fusion, lush green #2D6A4F integrated with clean tech forms,
            organic architecture silhouettes, solar panel motifs, growing vines on geometric
            structures, warm sunlight (#FFB627) accent, hopeful/utopian feel
          afrofuturism: >-
            cosmic + cultural fusion, rich jewel tones (gold #DAA520, deep purple #4A0E4E,
            electric blue #0077B6), Adinkra-inspired symbols, geometric patterns from African
            textile traditions, celestial motifs, futuristic technology merged with heritage
          editorial-minimalism: >-
            typographic-first composition, extreme whitespace, single accent color maximum,
            ultra-thin hairline rules (0.5px), high-contrast black + white, serif display
            type at monumental scale, magazine editorial grid, intellectual restraint
          swiss-international: >-
            Helvetica-style sans-serif at mathematical sizes, Müller-Brockmann grid system,
            asymmetric layouts with clear hierarchy, limited color (1-2 plus neutrals),
            flush-left ragged-right text, photographic elements in geometric crops
          flat-design: >-
            zero gradients, zero shadows, zero texture, solid color fills only, simple
            geometric shapes, bright saturated palette, clean vector icons, 2D perspective,
            Material Design color influence, crisp edges
          memphis-design: >-
            squiggles + dots + zigzag patterns, clash colors (pink + teal + yellow + black),
            geometric confetti scattered elements, bold 3px outlines, playful irreverent
            composition, no symmetry, Ettore Sottsass influence
          neubrutalism: >-
            thick black outlines 3px+, visible box-shadow offsets (4-8px solid black),
            saturated primary blocks, white background, no rounded corners, raw confrontational
            energy, monospace or grotesque type, anti-polish aesthetic
          analog-film-grain: >-
            film-grain noise overlay via feTurbulence (baseFrequency 0.65-0.8), warm color
            cast (Kodak Gold: +10 warm, Fuji: +5 green), vignette corners via radialGradient
            opacity, slightly desaturated, nostalgic/vintage feel
          watercolor: >-
            wet-edge bleeding effects via feGaussianBlur gradients, pigment granulation texture,
            transparent wash layers, paper texture background, visible brush loading variation,
            unpredictable organic edges, soft pastel palette
          woodblock-print: >-
            bold carved-line quality (thick strokes with blunt ends), limited flat color blocks
            (3-5 max), visible registration offset between color layers, traditional Japanese
            or European woodcut aesthetic, nature/landscape subjects
          risograph: >-
            halftone dot patterns via SVG pattern fills, 2-3 spot color overprint simulation
            (misregistration offset 1-2px), grain texture, limited color mixing through overlap,
            pink + blue or orange + teal typical combos, zine aesthetic
          double-exposure: >-
            two overlapping silhouette/image layers with multiply blend, transparency gradients
            revealing one image through another, portrait-landscape fusion, ethereal/dreamy,
            limited palette (monochrome or duotone)
          papercut: >-
            layered flat shapes at different z-depths, subtle shadow between layers (feDropShadow),
            paper texture on each layer, clean cut edges, dimensional depth through stacking,
            limited color per layer, craft/handmade feel
          kinetic-typography: >-
            text as the primary visual element, letters arranged in dynamic compositions,
            varying scales/weights/orientations, text along curved paths (textPath),
            typographic explosion/assembly, motion-implied static layouts
          data-visualization: >-
            clean chart/graph elements, precise geometric construction, labeled axes,
            data-driven color encoding, information-dense but clear hierarchy, gridlines,
            statistical graphic conventions, Tufte-influenced clarity
          retro-futurism: >-
            1950s-60s space age aesthetic, atomic/orbital motifs, ray-gun gothic shapes,
            optimistic primary + chrome palette, streamlined curves, Googie architecture
            silhouettes, starburst decorative elements
          cyberpunk: >-
            neon glow effects (feGaussianBlur + bright overlay), dark backgrounds (#0D0D0D),
            circuit board patterns, kanji/katakana text elements, rain-streak lines,
            holographic color shifts (cyan #00FFFF, magenta #FF00FF), dystopian tech
          steampunk: >-
            brass gear and cog mechanisms, Victorian ornamental frames, exposed clockwork,
            sepia/copper/brass palette (#B87333, #CD7F32, #8B4513), riveted metal plates,
            steam pipe motifs, aged parchment backgrounds
          mid-century-modern: >-
            organic boomerang/kidney shapes, atomic starburst decorations, Eames-era palette
            (mustard #FFBF00, teal #008080, burnt orange #CC5500, olive), tapered legs on
            furniture forms, space-age optimism, clean vector illustration style
          studio-product: >-
            isolated product silhouette on clean background, studio lighting simulation via
            gradient highlights, reflection plane beneath, minimal context, commercial
            photography aesthetic translated to vector, precise shadow casting
          lo-fi: >-
            hand-drawn imperfect lines (stroke-dasharray variation), notebook paper grid
            background, pencil/pen sketch quality, casual doodle elements, ruled margins,
            sticky note overlays, informal handwriting-style text, warm beige paper tone
          ai-diffusion: >-
            gradient noise patterns resembling diffusion model artifacts, soft probabilistic
            edges via feGaussianBlur, latent-space color transitions, emergent forms from
            noise fields, feTurbulence with high octaves, ethereal/generative aesthetic
          arte-povera-digital: >-
            raw unfinished materials translated to vector — rough burlap/canvas textures via
            feTurbulence (low frequency, high octaves), earth tones (#8B6914, #5C4033, #A0522D),
            deliberately crude shapes, anti-aesthetic honesty, exposed construction, minimal
            intervention, found-object assemblage composition, poverty of means as virtue
          aurora-ui: >-
            flowing gradient aurora bands via multi-stop linearGradient, translucent layered
            ribbons at varying opacities, dark background (#0A0E27), luminous greens (#00FF87)
            and purples (#7B2FFF) and cyans (#00D4FF), smooth organic curves, atmospheric glow
          bento-ui: >-
            grid-based card layout, rounded rectangle containers (rx=12-16), clean spacing
            between cells, minimal color (1-2 accent + neutrals), consistent padding,
            icon-in-card composition, Apple/Linear-inspired restraint
          cellular-automata: >-
            grid of small squares/cells, binary or limited color states per cell, Conway-style
            life patterns, regular grid spacing, emergent macro-patterns from micro-rules,
            monochrome or 2-3 color system, computational/mathematical aesthetic
          cinematic-photography: >-
            wide 21:9 aspect ratio compositions, dramatic lighting via gradient overlays,
            silhouette emphasis, film-grain feTurbulence, warm-cool color temperature contrast,
            lens flare simulation via radialGradient, shallow depth bokeh circles
          claymorphism: >-
            soft puffy raised shapes, inner shadow + outer shadow simulation (dual feDropShadow),
            pastel matte colors, rounded corners (rx=20+), tactile/squeezable appearance,
            subtle surface highlight gradient, playful 3D-ish depth
          cyanotype: >-
            Prussian blue (#003153) and white only, photogram-style botanical silhouettes,
            sun-print texture via feTurbulence, negative-space composition, handmade edges,
            historical chemical process aesthetic, tonal range within blue spectrum
          deconstructivism: >-
            fragmented overlapping planes, extreme diagonal angles, colliding grid systems,
            type at aggressive rotations, controlled chaos, Zaha Hadid / Daniel Libeskind
            influence, sharp angular forms, tension between elements, black + red accent
          duotone: >-
            exactly two colors mapped across tonal range, high-contrast silhouettes,
            gradient mapping via feColorMatrix, bold graphic impact, photo-to-illustration
            reduction, Spotify-influenced aesthetic, complementary or split-complementary pairs
          hdr-hyperrealism: >-
            extreme tonal range simulation, multiple gradient stops for highlight/shadow detail,
            vibrant oversaturated colors, dramatic sky gradients, crisp detail emphasis,
            HDR tone-mapping aesthetic translated to vector illustration
          infrared: >-
            false-color palette (white foliage, magenta #FF0090 vegetation, deep blue #000066
            skies), inverted tonal relationships, dreamlike/alien landscape feel, high contrast,
            IR photography simulation, surreal color mapping
          liquid-glass: >-
            highly refractive transparent surfaces, caustic light patterns via complex gradients,
            fluid organic shapes, chromatic aberration simulation (offset colored duplicates),
            bubble/droplet forms, prismatic rainbow edge effects, ultra-modern material feel
          low-poly: >-
            faceted triangular mesh, flat-shaded polygon faces, limited vertices, geometric
            simplification of organic forms, each triangle a single solid fill, crystalline/
            gem-like appearance, pastel or vibrant color per face, no gradients within faces
          material-design: >-
            Google Material Design system, 8dp grid, elevation shadow hierarchy (feDropShadow
            at 1dp/2dp/4dp/8dp), FAB circle button, bottom navigation bar, surface cards
            with rounded corners (rx=4), Material color slots (primary, secondary, surface)
          miniature-diorama: >-
            tilt-shift blur simulation (feGaussianBlur on top/bottom edges), tiny-world scale,
            detailed miniature scenes viewed from above, warm saturated colors, model/toy
            aesthetic, exaggerated depth of field, whimsical overhead perspective
          minimalist-maximalism: >-
            paradox aesthetic — single bold element surrounded by vast whitespace, extreme
            scale contrast (one huge element + tiny details), dramatic negative space,
            tension between restraint and excess, striking focal point, minimal palette
          pixel-art: >-
            strict pixel grid (no anti-aliasing), each "pixel" a small rect element, limited
            palette (8-16 colors), retro 8-bit/16-bit aesthetic, shape-rendering="crispEdges",
            character sprites or icon subjects, NES/SNES color constraints
          resonant-stark: >-
            high-contrast black #000000 and white #FFFFFF only, dramatic positive/negative
            space interplay, bold graphic silhouettes, no gray tones, woodcut or linocut
            print quality, stark emotional impact, minimal but powerful
          retro-vintage-print: >-
            aged paper texture via feTurbulence, worn letterpress type, limited spot colors
            (2-3 Pantone-style), registration marks, crop marks, misregistration offset,
            Victorian/Art Nouveau-era ornamental borders, nostalgic ephemera aesthetic
          skeuomorphism: >-
            realistic material simulation, leather/wood/metal texture via SVG patterns,
            glossy button highlights (linearGradient white→transparent), stitching detail
            patterns, realistic shadows, iOS6-era interface aesthetic, physical metaphor
          tactile-craft-digital: >-
            handmade material textures (felt, paper, fabric via feTurbulence patterns),
            stitched edges (dashed stroke patterns), button/badge shapes, collage layering,
            warm analog materials in digital composition, craft aesthetic
          tilt-shift: >-
            selective focus blur (feGaussianBlur on peripheral areas, sharp center band),
            miniaturization effect, vivid saturation boost, overhead urban/landscape scenes,
            toy-like appearance, narrow depth of field simulation
          woodcut: >-
            bold carved parallel lines (thick strokes, uniform weight), black ink on white,
            relief print aesthetic, cross-hatching for tonal gradation, limited gray via
            line density, traditional engraving/xylography style, strong contrast
          y2k-revival: >-
            chrome/metallic text effects (linearGradient silver), bubble/inflatable shapes,
            hot pink #FF69B4 + electric blue #0066FF + lime #CCFF00, cyber-futuristic forms,
            butterfly/star decorative elements, glossy surfaces, 1999-2003 web aesthetic

    image_to_svg:
      - model: QuiverAI Arrow (Image-to-SVG)
        provider: QuiverAI
        api: quiverai
        sdk_package: "@quiverai/sdk"
        sdk_method: client.vectorizeSVG.vectorizeSVG()
        rest_endpoint: POST https://api.quiver.ai/v1/svgs/vectorizations
        model_id: arrow-preview
        tier: standard
        strengths: high-fidelity raster-to-SVG vectorization, production-ready vector output from any PNG/JPEG/WebP
        parameters:
          model: "arrow-preview (required)"
          image: "object (required) — url string or base64 string"
          auto_crop: "boolean (optional, default false) — crop to dominant subject"
          target_size: "integer (optional) — square resize in pixels (128-4096)"
          n: "integer (optional, default 1) — number of outputs (1-16)"
          stream: "boolean (optional, default false) — SSE stream"
          temperature: "number (optional, default 1) — randomness (0-2)"
          top_p: "number (optional, default 1) — nucleus sampling (0-1)"
          presence_penalty: "number (optional, default 0) — pattern variety (-2 to 2)"
          max_output_tokens: "integer (optional) — upper bound (1-131072)"
        use_in_pipeline: >-
          Convert fal.ai-generated raster images to scalable SVG for resolution-independent
          rendering. Use for: hero images that need to scale across breakpoints, illustrations
          that will be CSS-animated, any asset that must render crisp from 16px to 4K.
          Pre-processing tip: crop input tightly to subject for best path quality.
        per_style_vectorization_config:
          geometric_styles: # bauhaus, de-stijl, swiss-international, flat-design, isometric, constructivism
            auto_crop: true
            temperature: 0.3 # low — preserve geometric precision
            note: geometric inputs produce the cleanest SVG paths
          organic_styles: # art-nouveau, impressionism, watercolor, wabi-sabi
            auto_crop: true
            temperature: 0.7 # moderate — allow some artistic interpretation
            note: organic forms may produce complex path counts — optimize with SVGO after
          photographic_styles: # cinematic, analog-film-grain, studio-product, double-exposure
            auto_crop: false # preserve full frame composition
            temperature: 0.5
            note: photographic content vectorizes as simplified illustration — only use when deliberate style shift is wanted
          pattern_styles: # generative-art, fractal, noise-field, particle-systems, psychedelic
            auto_crop: false
            temperature: 0.4
            note: repeating patterns may exceed reasonable path counts — set target_size lower (256-512) and tile

  pipeline_model_selection:
    description: >-
      Decision tree for selecting the right functional model at each pipeline stage.
      Given a task, follow the tree to the recommended fal.ai endpoint.
    background_removal:
      commercial_deliverable: Bria RMBG 2.0 (fal-ai/bria/rmbg)
      complex_edges_hair_transparency: BiRefNet v2 Heavy (fal-ai/birefnet/v2 variant Heavy)
      simple_product_on_white: BiRefNet v2 Light (fal-ai/birefnet/v2 variant Light)
      video_background: Video Background Removal (fal-ai/bria/video/background-removal)
    upscaling:
      ai_generated_image: Topaz Image CGI variant (fal-ai/topaz/upscale/image)
      face_heavy: SeedVR (fal-ai/seedvr)
      ai_generated_video: Topaz Video Gaia CG (fal-ai/topaz/upscale/video)
      quick_batch: ESRGAN (fal-ai/esrgan)
      general_enhancement: Clarity Upscale (fal-ai/clarity-upscale)
    structural_guidance:
      geometric_layout: Z-Image Turbo ControlNet canny_edges (fal-ai/z-image/turbo/controlnet)
      three_d_perspective: FLUX [pro] Depth (fal-ai/flux-depth/pro)
      character_pose: Z-Image Turbo ControlNet pose_skeleton (fal-ai/z-image/turbo/controlnet)
      multi_control: SDXL ControlNet Union (fal-ai/sdxl-controlnet-union)
    image_editing:
      surgical_mask_edit: FLUX [pro] Fill (fal-ai/flux-pro/v1/fill)
      style_transfer_from_reference: FLUX Kontext [pro] (fal-ai/flux-kontext/pro)
      physics_aware_material: PhysicEdit (fal-ai/physic-edit)
      background_swap: Bria Background Replace (fal-ai/bria/background-replace)
      product_placement: Bria Embed Product (bria/embed-product)
      quick_natural_language_edit: GPT Image 1 (fal-ai/gpt-image-1) or Nano Banana 2 Edit (fal-ai/nano-banana-2/edit)
    camera_controlled_video:
      specific_camera_path: Kling 3 Pro bracket notation (fal-ai/kling-video/v3/pro)
      professional_cinematography: Higgsfield DoP (fal-ai/higgsfield/dop)
      physics_based_motion: Goal Force (fal-ai/goal-force)
      start_end_keyframes: Kling O3 (fal-ai/kling-video/o3/standard/image-to-video)
    video_modification:
      restyle_preserving_motion: LTX-2.3 Retake Video (fal-ai/ltx-2.3/retake-video) or Luma Modify Video (fal-ai/luma/modify-video)
      extend_duration: LTX-2.3 Extend Video (fal-ai/ltx-2.3/extend-video)
      transfer_motion: Kling v3 Motion Control (fal-ai/kling-video/v3/pro/motion-control)
      multi_shot_narrative: MultiShotMaster (fal-ai/multishot-master)
    three_d_generation:
      single_image_fast: TripoSR (fal-ai/triposr)
      single_image_quality: Trellis 2 (fal-ai/trellis-2)
      retexture_existing: Trellis 2 Retexture (fal-ai/trellis-2/retexture)
      multi_image_precise: Trellis Multi (fal-ai/trellis/multi)
      complex_character: Hyper3D Rodin (fal-ai/hyper3d/rodin)
    audio_generation:
      voiceover: Gemini TTS (fal-ai/gemini-tts)
      voice_clone_open: Zonos (fal-ai/zonos)
      voice_clone_branded: MiniMax Voice Clone (fal-ai/minimax/voice-clone)
      background_music: CassetteAI Music (fal-ai/cassetteai/music-gen)
      sound_effects: CassetteAI SFX (fal-ai/cassetteai/sfx-gen)
      talking_head: OmniHuman v1.5 (fal-ai/bytedance/omnihuman/v1.5)
    ux_annotation:
      screenshot_draw_over: GPT Image 1 (fal-ai/gpt-image-1)
      gaze_detection: MoonDreamNext (fal-ai/moondream-next)
      fallback_annotation: Nano Banana 2 Edit (fal-ai/nano-banana-2/edit)
    svg_generation:
      text_to_svg_logo_icon: QuiverAI Arrow text-to-SVG (api.quiver.ai/v1/svgs/generations model arrow-preview)
      text_to_svg_illustration: QuiverAI Arrow text-to-SVG with references (api.quiver.ai/v1/svgs/generations model arrow-preview + references array)
      text_to_svg_decorative: QuiverAI Arrow text-to-SVG with instructions (api.quiver.ai/v1/svgs/generations model arrow-preview + instructions field)
      raster_to_svg_vectorization: QuiverAI Arrow image-to-SVG (api.quiver.ai/v1/svgs/vectorizations model arrow-preview)
      note: >-
        SVG generation routes through QuiverAI API (NOT fal.ai). Use for any asset
        that must be resolution-independent, CSS-animatable, or file-size-optimized.
        For complex illustrations requiring photorealism, generate raster via fal.ai
        first, then vectorize via QuiverAI image-to-SVG if a vector version is needed.

external_tool_registry:
  description: >-
    Registry of 50+ external tools across 10 categories that the skill can export
    workflow packages for. Each tool entry documents: official docs URL, what the
    export .zip contains, prompt format adaptation rules, and when to suggest the tool.
    Export packages contain tool-adapted prompts, generated assets, configuration files,
    style specs, quality reports, and step-by-step import guides.
    Users can also register custom tools — see custom_tool_schema section.

  video_production:
    - tool: Runway
      docs_url: https://docs.dev.runwayml.com/
      sdk: "@runwayml/sdk"
      models: [gen4.5, gen4_image, gen4_image_turbo, gen4_turbo, aleph]
      export_contents:
        - Gen-4.5/Aleph format prompts with @reference tag syntax for reference images
        - reference images for image-to-video generation
        - storyboard PDF with shot-by-shot breakdown
        - camera movement guide adapted from taxonomy camera_choreography
        - aspect ratio specs matching Runway supported dimensions
      prompt_adaptation:
        format: plain_text
        reference_syntax: "@tag in prompt text, tag 3-16 alphanumeric chars"
        max_prompt_length: 1000
        supports_negative: false
        special_features: reference images up to 3, first-frame keyframing
      suggest_when: multi-shot editing, VFX, professional video refinement, Runway UI preferred
    - tool: CapCut
      docs_url: https://www.capcut.com/
      export_contents:
        - video assets (MP4)
        - audio tracks
        - subtitle SRT files
        - effect suggestions guide with taxonomy motion_signature mapping
        - timeline structure JSON
      suggest_when: quick social media editing, TikTok/Reels/Shorts content
    - tool: DaVinci Resolve
      docs_url: https://www.blackmagicdesign.com/products/davinciresolve
      export_contents:
        - video assets
        - color grading LUT files derived from taxonomy style color palette
        - audio stems
        - EDL/XML timeline structure
        - Fusion composition guide for motion graphics
