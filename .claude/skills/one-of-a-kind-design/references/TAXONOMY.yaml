        - reduced UI chrome — let imagery dominate
    - style_id: infrared
      default_dials:
        design_variance: 5
        motion_intensity: 3
        visual_density: 3
        audience_formality: 5
      typography:
        display: clean sans-serif
        body: same
      motion_character: slow ethereal drift — spectral color transitions
      anti_slop_overrides:
        - "false-color mapping: vegetation=white/pink, sky=deep blue/black"
        - no natural-looking colors — the inversion IS the point
      premium_component_patterns:
        - CSS filter hue-rotate + invert combinations for infrared simulation
        - normal-to-infrared transition animation on hover/toggle
        - deep blue/black background tokens extracted from IR sky
    - style_id: cyanotype
      default_dials:
        design_variance: 4
        motion_intensity: 2
        visual_density: 3
        audience_formality: 6
      typography:
        display: thin serif or botanical-illustration lettering
        body: same
      motion_character: slow exposure reveal — light-painting fade-in
      anti_slop_overrides:
        - "exactly two tones: Prussian blue (#003153) and white — nothing else"
        - paper/chemical texture is expected
        - botanical/specimen display layout (centered, labeled)
      premium_component_patterns:
        - duotone blue filter applied to all imagery via CSS filter + mix-blend-mode
        - paper fiber texture overlay
        - slow opacity reveal simulating sun-print exposure process
    - style_id: double-exposure
      default_dials:
        design_variance: 6
        motion_intensity: 4
        visual_density: 3
        audience_formality: 5
      typography:
        display: thin sans-serif or elegant serif
        body: same
      motion_character: slow cross-fade blend between image layers
      anti_slop_overrides:
        - compositing via screen or multiply blend — not opacity stacking
        - image pair curation matters — contrast between subject types (portrait + landscape)
      premium_component_patterns:
        - "CSS mix-blend-mode: screen between two positioned image layers"
        - opacity balance shift on scroll as interactive blend control
        - mask-image gradient for selective blend regions
    - style_id: miniature-diorama
      default_dials:
        design_variance: 4
        motion_intensity: 3
        visual_density: 3
        audience_formality: 3
      typography:
        display: rounded sans-serif or handwritten
        body: same
      motion_character: gentle stop-motion optional — scene exploration via camera-position states
      anti_slop_overrides:
        - shallow depth-of-field is mandatory — strong blur outside focus area
        - warm color grading with slightly boosted saturation
        - visible craft materials and small-scale detail
      premium_component_patterns:
        - tilt-shift blur CSS treatment on scene imagery
        - "warm color grade overlay via filter: saturate(1.2) sepia(0.1)"
        - zoom-to-detail interaction revealing miniature craftsmanship
    - style_id: studio-product
      default_dials:
        design_variance: 2
        motion_intensity: 3
        visual_density: 2
        audience_formality: 7
      typography:
        display: clean sans-serif, minimal presence — product is the star
        body: same, light weight
      motion_character: smooth, precise — 360° rotation, zoom to detail
      anti_slop_overrides:
        - background is seamless white, warm gray, or cool gray — no patterns
        - shadow consistency across all product shots
        - maximum negative space — product needs breathing room
      premium_component_patterns:
        - consistent aspect-ratio containers for product image slots
        - contact-shadow effect using radial-gradient beneath products
        - "hover-zoom with overflow: hidden for detail inspection"
        - "neutral background token variants (pure white, warm gray #F5F5F0, cool gray #F0F2F5)"
  convention_breaking:
    principle:
      'The most generic thing an AI can do is pair Art Deco with "luxury brands" and Flat Design with "mobile apps."
      The taxonomy''s use_cases field documents where styles are commonly applied. This section documents where they COULD
      be applied — the unexpected pairings that create genuinely distinctive products. Every style is viable for every context
      when adapted with intentionality.

      '
    unexpected_applications:
      - style_id: brutalist-web
        conventional_use: artist portfolios, experimental agencies
        unexpected_use: enterprise banking dashboard
        adaptation:
          'Strip all visual polish from the data layer. Raw monospace numbers, thick black table borders, zero decoration.
          The brutalist honesty reads as radical transparency in finance — "we have nothing to hide, not even behind a drop
          shadow." Use system fonts for speed. Dense information display without cosmetic softening. The emotional message shifts
          from "raw and edgy" to "unflinchingly honest."

          '
        dial_overrides:
          design_variance: 6
          motion_intensity: 1
          visual_density: 8
          audience_formality: 9
      - style_id: wabi-sabi
        conventional_use: wellness brands, ceramics e-commerce
        unexpected_use: developer tools / CLI documentation
        adaptation:
          'Imperfection as engineering humility. Hand-drawn-feeling diagrams for architecture docs. Organic textures
          behind code blocks. Muted earth-tone syntax highlighting. The philosophy of "nothing is finished, nothing is perfect"
          maps directly to iterative software development. Generous whitespace in documentation signals that reading comfort
          matters as much as information density.

          '
        dial_overrides:
          design_variance: 5
          motion_intensity: 1
          visual_density: 3
          audience_formality: 6
      - style_id: art-deco
        conventional_use: luxury brands, event invitations
        unexpected_use: fitness tracking / health app
        adaptation:
          "The geometric precision and gold-accent vocabulary translates to achievement and milestone celebration.
          Progress rings with deco geometric frames. Weekly stats displayed in symmetric, ordered compositions. The formality
          dial drops (5 instead of 8) but the visual vocabulary stays — chevron patterns mark PR zones, gold accents celebrate
          personal records. Health becomes aspiration.

          "
        dial_overrides:
          design_variance: 4
          motion_intensity: 5
          visual_density: 5
          audience_formality: 5
      - style_id: psychedelic
        conventional_use: music festivals, cannabis brands
        unexpected_use: scientific data visualization
        adaptation:
          'The saturated, flowing color language becomes a tool for mapping complex multidimensional datasets. Kaleidoscopic
          color ramps for heatmaps. Organic flow-field layouts for network graphs. The psychedelic vocabulary of "seeing connections
          everywhere" is literally what scientific visualization tries to do. Motion intensity drops to 4 for readability. Color
          saturation stays high but mapped to data values, not decoration.

          '
        dial_overrides:
          design_variance: 7
          motion_intensity: 4
          visual_density: 7
          audience_formality: 5
      - style_id: rococo
        conventional_use: wedding stationery, luxury packaging
        unexpected_use: children's educational platform
        adaptation:
          "Rococo's playful asymmetry and theatrical excess map to the wonder and delight that makes learning stick.
          Ornamental frames become achievement borders. Gold scrollwork marks mastery levels. The pastel palette (already child-friendly)
          pairs with serif type at a reading-comfortable scale. Formality drops to 2, motion rises to 6 for celebration animations.
          Each lesson completion triggers an unfurl-and-sparkle reward sequence.

          "
        dial_overrides:
          design_variance: 6
          motion_intensity: 6
          visual_density: 4
          audience_formality: 2
      - style_id: constructivism
        conventional_use: protest branding, editorial design
        unexpected_use: project management / kanban board
        adaptation:
          "The diagonal energy and dramatic type scale become tools for urgency and priority communication. Red =
          blocked. Black = in progress. White = done. The propaganda-poster visual intensity makes project status impossible
          to ignore. Diagonal accents mark deadline proximity. Extreme headline/body scale contrast creates instant scannable
          hierarchy. This is a task board that demands attention instead of fading into tab background noise.

          "
        dial_overrides:
          design_variance: 7
          motion_intensity: 3
          visual_density: 8
          audience_formality: 7
      - style_id: surrealism
        conventional_use: creative portfolios, album art
        unexpected_use: onboarding flow / user setup wizard
        adaptation:
          'Dreamlike spatial disruption guides users through an unexpected journey instead of a mechanical form-fill.
          Each step is a new "room" with impossible spatial relationships. Form fields float in surreal space. Progress feels
          like exploration, not paperwork. Motion intensity high (7) for morphing transitions between steps. The impossible
          physics communicates "this isn''t boring setup — this is the beginning of something." Validation errors manifest as
          spatial distortions.

          '
        dial_overrides:
          design_variance: 9
          motion_intensity: 7
          visual_density: 2
          audience_formality: 3
      - style_id: risograph
        conventional_use: event posters, zine layouts
        unexpected_use: analytics dashboard
        adaptation:
          'Spot-color charts with halftone grain. Each data series gets a riso ink color. Overlap areas where series
          intersect produce the natural third-color of multiply blending — data overlap becomes visually self-evident. The slight
          misregistration jitter on hover communicates "this is live data, always updating, never perfectly static." The lo-fi
          print aesthetic makes dense numbers feel approachable instead of clinical.

          '
        dial_overrides:
          design_variance: 5
          motion_intensity: 3
          visual_density: 7
          audience_formality: 4
      - style_id: pixel-art
        conventional_use: retro game UIs, nostalgia campaigns
        unexpected_use: legal document review platform
        adaptation:
          "Absurd? Consider: pixel-art's strict indexed palette creates instant visual coding for document status.
          Each pixel-scale icon is unambiguous at any zoom level. The nostalgia factor reduces the stress of legal review. Sprite-based
          status animations (a tiny character walking across a progress bar) add delight to a dreaded workflow. The constraint
          of pixel-grid precision maps to the precision that legal work demands.

          "
        dial_overrides:
          design_variance: 3
          motion_intensity: 3
          visual_density: 7
          audience_formality: 5
      - style_id: glassmorphism
        conventional_use: music apps, notification panels
        unexpected_use: architecture / real estate floorplan viewer
        adaptation:
          "Frosted-glass panels as literal floor-plan overlays on property photography. Each room is a glass card
          with specs visible through translucent blur. Swipe between rooms — the blur shifts to reveal different background
          zones. The layered depth metaphor matches the layered spatial reality of architecture. Background imagery is the property;
          glass panels are the data layer.

          "
        dial_overrides:
          design_variance: 5
          motion_intensity: 5
          visual_density: 5
          audience_formality: 6
      - style_id: memphis-design
        conventional_use: youth branding, social media
        unexpected_use: personal finance app
        adaptation:
          'Money is emotional and finance apps pretend it isn''t. Memphis''s deliberate anti-taste and clashing joy
          reframes budgeting as play, not punishment. Terrazzo patterns fill savings-goal progress bars. Confetti burst on reaching
          a target. The emotional message: "your financial life should feel as alive as your social life." Anti-slop critical:
          the playfulness must be precise — readable numbers, clear hierarchy, delightful surface. Not childish, not corporate
          — genuinely fun.

          '
        dial_overrides:
          design_variance: 6
          motion_intensity: 5
          visual_density: 5
          audience_formality: 2
      - style_id: wireframe-mesh
        conventional_use: developer tools, VR interfaces
        unexpected_use: luxury fashion e-commerce
        adaptation:
          'The wireframe aesthetic becomes "seeing the construction beneath the garment." Product imagery transitions
          from photograph to wireframe mesh on hover — revealing the structure. The Tron-like grid runway becomes a literal
          runway. Green/cyan on black reads as avant-garde couture, not developer-tool. The transparency of wireframe communicates
          craftsmanship — "see how this was built."

          '
        dial_overrides:
          design_variance: 7
          motion_intensity: 5
          visual_density: 3
          audience_formality: 8
      - style_id: noise-field
        conventional_use: generative backgrounds, ambient art
        unexpected_use: meditation / breathing exercise app
        adaptation:
          "Flow-field particle paths synced to breathing rhythm. Inhale: particles converge inward. Exhale: particles
          expand outward. The organic, topographic quality of noise fields maps directly to the body's natural flow. The visual
          breathes WITH you. Color shifts from cool (inhale/calm) to warm (exhale/release). Zero UI chrome during active meditation
          — pure generative canvas.

          "
        dial_overrides:
          design_variance: 4
          motion_intensity: 6
          visual_density: 1
          audience_formality: 3
      - style_id: swiss-international
        conventional_use: corporate identity, wayfinding
        unexpected_use: hip-hop / streetwear brand
        adaptation:
          'The grid-locked precision reads as supreme confidence — the same reason Supreme literally uses Futura Bold.
          Müller-Brockmann''s mathematical layouts applied to drop schedules, lookbooks, and release calendars. Photography
          crops to exact grid modules. Single accent color (brand red, neon green) against B&W base. The anti-decoration philosophy
          maps to streetwear''s "let the product speak" ethos. Helvetica Bold at enormous scale.

          '
        dial_overrides:
          design_variance: 4
          motion_intensity: 3
          visual_density: 5
          audience_formality: 6
      - style_id: cinematic
        conventional_use: film websites, luxury campaigns
        unexpected_use: recipe / cooking application
        adaptation:
          "Every dish is a hero shot. Letterboxed 2.35:1 food photography with shallow depth-of-field and warm color
          grading. Step-by-step instructions unfold like a film sequence — slow pans across ingredient mise-en-place, dramatic
          reveal of the finished plate. The teal-and-orange grade makes food look impossibly delicious. Timer countdowns in
          cinematic title-card typography. Cooking becomes cinema. Formality stays high — this is NOT a casual app.

          "
        dial_overrides:
          design_variance: 5
          motion_intensity: 5
          visual_density: 3
          audience_formality: 7
