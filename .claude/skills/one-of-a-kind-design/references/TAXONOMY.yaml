        - flat-design
        - material-design
        - swiss-international
      break_the_mold:
        - style_id: art-deco
          why: geometric rigor reads as premium authority — your enterprise tool stops looking like every other gray dashboard
        - style_id: brutalist-web
          why: for developer-facing products, raw structure signals technical credibility over marketing polish
      actively_avoid:
        - style_id: psychedelic
          why: decision-making contexts need clarity, not sensory overload
        - style_id: surrealism
          why: spatial disorientation conflicts with productivity goals
    - market: Consumer Fintech
      default_safe:
        - flat-design
        - dark-mode-ui
        - scandinavian-minimalism
      break_the_mold:
        - style_id: claymorphism
          why: the tactile softness reduces financial anxiety — money feels less intimidating when the interface feels friendly
        - style_id: art-deco
          why: signals 'old money' confidence — the opposite of fintech's typical startup-blue aesthetic
      actively_avoid:
        - style_id: glitch
          why: data corruption aesthetics in a financial context signals unreliability
        - style_id: brutalist-web
          why: raw structure in a money context reads as 'we didn't invest in security'
    - market: Healthcare / Wellness
      default_safe:
        - scandinavian-minimalism
        - flat-design
      break_the_mold:
        - style_id: wabi-sabi
          why: imperfection-as-beauty directly serves mental health messaging — the aesthetic IS the therapy
        - style_id: aurora-ui
          why: atmospheric gradients create calming environments that reduce clinical anxiety
        - style_id: impressionism
          why: the soft luminosity creates a non-institutional feeling that clinical UIs desperately need
      actively_avoid:
        - style_id: constructivism
          why: the aggressive energy and high contrast create anxiety in health contexts
        - style_id: memphis-design
          why: clashing colors and chaotic patterns conflict with the calm needed in health decisions
    - market: Creative Tools / Design Software
      default_safe:
        - dark-mode-ui
        - flat-design
        - material-design
      break_the_mold:
        - style_id: swiss-international
          why: the tool's UI should model the design discipline it enables — Swiss grid for a design tool is meta-competence
        - style_id: constructivism
          why: the energetic asymmetry signals creative freedom — Linear uses constructivist energy effectively
      actively_avoid:
        - style_id: rococo
          why: ornamental excess in a tool context competes with the user's creative output
        - style_id: skeuomorphism
          why: realistic textures date fast and create visual competition with the user's canvas
    - market: E-commerce / DTC
      default_safe:
        - studio-product
        - scandinavian-minimalism
      break_the_mold:
        - style_id: risograph
          why: the analog texture differentiates instantly from the endless white-background product grid
        - style_id: ukiyo-e
          why: for culturally-rooted products, the woodblock aesthetic creates narrative depth that lifestyle photography cannot
      actively_avoid:
        - style_id: wireframe-mesh
          why: the technical skeleton aesthetic works against the desire to present finished, desirable products
        - style_id: cellular-automata
          why: the binary-grid abstraction removes all product warmth
    - market: Education / EdTech
      default_safe:
        - material-design
        - flat-design
        - claymorphism
      break_the_mold:
        - style_id: bauhaus
          why: the shapes-as-primitives visual language is pre-literate-friendly and inherently pedagogical
        - style_id: isometric
          why: dimensional illustration explains spatial concepts that flat diagrams cannot
        - style_id: papercut
          why: the layered, tactile quality connects digital learning to physical craft — especially for younger audiences
      actively_avoid:
        - style_id: surrealism
          why: disorienting spatial relationships conflict with learning clarity
        - style_id: brutalist-web
          why: raw exposure of structure intimidates novice users who need guardrails
    - market: Music / Audio / Entertainment
      default_safe:
        - dark-mode-ui
        - aurora-ui
      break_the_mold:
        - style_id: vaporwave
          why: for artists who want nostalgic-digital identity, nothing else carries the same cultural weight
        - style_id: skeuomorphism
          why: audio production interfaces are the ONE context where realistic knobs and sliders are not just acceptable but expected
        - style_id: afrofuturism
          why: for artists in Afro-diasporic music traditions, the style carries cultural meaning that generic dark-mode cannot
      actively_avoid:
        - style_id: swiss-international
          why: the objective rationality conflicts with music's emotional expression
        - style_id: studio-product
          why: the clinical white-background approach removes all atmosphere from what should be an immersive experience
implementation_intelligence:
  meta:
    description:
      'A framework for turning visual style selections into production-grade frontend code that avoids generic
      AI output. Provides tunable dials, anti-slop guardrails, premium motion catalogs, typography intelligence, and — critically
      — a convention-breaking matrix that liberates every style from its "expected" use case. The goal is not to dictate taste
      but to create the conditions under which genuine taste can emerge.

      '
  anti_slop:
    typography:
      banned_defaults:
        - font: Inter
          reason: Statistical mode of AI output — appears in 80%+ of generated UIs
        - font: Roboto
          reason: Android system default treated as 'good enough' — it's not a choice, it's an absence of choice
        - font: Open Sans
          reason: 2012-era safe pick that signals zero typographic opinion
        - font: Arial
          reason: System fallback masquerading as a design decision
      principle:
        "Typography is the highest-leverage design decision. The font you choose communicates before a single word
        is read. Every style MUST specify a deliberate typographic voice — never rely on framework defaults. The test: if
        you swapped the font for Inter, would anyone notice the design changed? If yes, you chose well. If no, you chose nothing.

        "
      premium_sans_stack: "'Geist Sans', 'Satoshi', 'Outfit', 'Cabinet Grotesk', 'Switzer', 'General Sans', sans-serif"
      editorial_serif_stack: "'Lyon Text', 'Newsreader', 'Instrument Serif', 'Playfair Display', 'Fraunces', serif"
      monospace_stack: "'Geist Mono', 'JetBrains Mono', 'SF Mono', 'Berkeley Mono', 'Fira Code', monospace"
      display_stack: "'Clash Display', 'Space Grotesk', 'Syne', 'Plus Jakarta Sans', 'Manrope', sans-serif"
      rules:
        - "body text is never #000000 — use off-black (#111, #1a1a1a, #2F3437)"
        - "body line-height: 1.5–1.7, never 1.0 or browser default"
        - headings get tight tracking (-0.01em to -0.04em), body gets normal or slightly loose
        - max line length ~65ch for readability — constrain with max-width
        - establish at least 3 type scale tiers with visible contrast between them
    color:
      banned_defaults:
        - pattern: purple-gradient-on-white
          reason: "the #1 AI-generated color scheme — instantly marks output as synthetic"
        - pattern: blue-500 primary with gray-100 background
          reason: Tailwind default palette used without modification
        - pattern: rainbow accent spectrum
          reason: using every color equally means you chose none
        - pattern: "pure #000000 backgrounds"
          reason: "use rich near-blacks with color undertone (#0a0a0a, #111827, #1c1917)"
      principle:
        "Color is scarce or it's noise. Either commit to restraint (2–3 hues max with the rest neutral) or commit
        to maximalism (full palette with intentional relationships). The middle ground — 4–5 random bright accents on gray
        — is where generic lives.

        "
      rules:
        - desaturate accents to blend with neutrals — oversaturation is the default AI tell
        - tinted shadows that carry the hue of the object, not generic rgba(0,0,0,x)
        - background is never just a flat solid — add grain, subtle gradient, or texture
        - dark mode is not light mode inverted — redesign surface hierarchy from scratch
    shadows_and_depth:
      banned_defaults:
        - Tailwind shadow-md, shadow-lg, shadow-xl used without customization
        - neon outer-glow box-shadows
        - uniform shadow on every element — shadows are hierarchy, not decoration
      principle:
        "Shadows communicate physical truth. Generic shadows say nothing about the world the UI inhabits. Every shadow
        choice implies a light source, a surface material, and a distance. Choose those things deliberately or use no shadows
        at all.

        "
      rules:
        - if using shadows, define a consistent light direction (top-left is convention, break it if the style demands)
        - shadow opacity below 0.15 for sophistication, above 0.3 for graphic boldness
        - "elevation-based shadow scales: define 3–5 tiers, never ad-hoc per element"
        - consider colored shadows, inner shadows, or no shadows as alternatives to the drop-shadow default
    layout:
      banned_defaults:
        - centered single-column with hero → features grid → testimonials → CTA → footer
        - card grid where every card is identical size and spacing
        - hero section with oversized H1, subtitle, and two buttons
      principle:
        "The most damaging AI default is structural — the same page skeleton with different paint. Break the template.
        This means: vary section rhythms (tall sparse followed by dense grid), use asymmetric compositions, let content dictate
        structure instead of structure constraining content.

        "
      rules:
        - at least one section per page should break the column grid
        - vary vertical padding between sections — not uniform py-16 everywhere
        - negative space is a design element, not empty space waiting to be filled
        - overlap, bleed, and offset are tools — use them when the style permits
    motion:
      banned_defaults:
        - linear easing on anything
        - 300ms transition-all on hover
        - fade-in-from-bottom on every scroll entry
        - simultaneous mount of all elements
      principle:
        "Motion is choreography or it's jitter. Stagger entries. Use spring physics (stiffness: 100, damping: 20
        as baseline). Differentiate between structural motion (page transitions, layout shifts) and gestural motion (hover,
        press, drag). Always respect prefers-reduced-motion.

        "
      premium_motion_catalog:
        scroll_driven:
          - parallax card stacks — sections stick and layer during scroll
          - split-screen scroll — two halves sliding opposite directions
          - curtain reveal — hero parting in the middle on scroll
          - text mask reveals — large type as window to video behind
          - scroll-driven variable font weight interpolation
        hover_and_interaction:
          - magnetic cursor pull — elements gravitate toward pointer
          - spotlight borders — card edges illuminate under cursor
          - 3D parallax tilt tracking mouse coordinates
          - holographic foil — iridescent reflections shifting on hover
          - press-to-inset with spring bounce on release
        ambient:
          - slow-drifting gradient blobs (20s+ cycle, opacity 0.02–0.04)
          - "grain/noise overlay (fixed, pointer-events: none)"
          - infinite micro-loops per card (pulse, float, typewriter)
          - chroma borders — subtle continuous color gradient animation
        entry:
          - "staggered cascade: delay = index × 80ms"
          - expanding mask wipes tied to scroll progress
          - draw-on SVG path reveals
          - scale-from-zero with spring overshoot
      performance_rules:
        - animate only transform and opacity — never layout properties
        - use will-change sparingly, only on actively animating elements
        - IntersectionObserver for scroll triggers — never window scroll listeners
        - "wrap all motion in @media (prefers-reduced-motion: no-preference)"
        - target 60fps — test on low-end devices
    copy:
      banned_phrases:
        - Elevate your
        - Seamless experience
        - Unleash the power
        - Next-generation
        - Game-changer
        - Delve into
        - Harness the
        - Cutting-edge
        - Revolutionize
        - Empower your
      principle:
        'Write like a human who knows the product, not a brochure generator. Specificity beats superlatives. "Processes
        10,000 rows in 2 seconds" beats "blazingly fast performance." Realistic content (actual names, plausible numbers,
        contextual detail) beats Lorem Ipsum every time.

        '
  creative_dials:
    design_variance:
      range: 1–10
      description: How experimental the layout and composition are
      tiers:
        conservative: "1–3: centered symmetric layouts, standard grid, safe hierarchy, corporate-appropriate"
        creative: "4–6: asymmetric touches, mixed section rhythms, overlapping elements, editorial flair"
        radical: "7–10: broken grid, masonry, extreme negative space, elements bleeding off-screen, art-direction-level composition"
      per_style_guidance:
        historical_fine_art: start at 5–7 — these styles have inherent compositional opinions
        modern_digital_ui: start at 3–5 — systematic styles need controlled variance
        illustration_graphic: start at 5–8 — illustration styles thrive with spatial freedom
        cultural_regional: start at 6–9 — cultural styles lose authenticity when over-gridded
        generative_algorithmic: start at 7–10 — generative styles ARE variance
        photography_rendering: start at 4–6 — let the image drive, layout serves
    motion_intensity:
      range: 1–10
      description: How much and how dramatically elements move
      tiers:
        static: "1–3: color shifts on hover, simple opacity fades, no scroll effects"
        fluid: "4–6: spring-physics hover states, staggered scroll entries, smooth page transitions"
        cinematic: "7–10: magnetic cursor, parallax stacking, scroll-driven choreography, ambient particle systems"
      per_style_guidance:
        historical_fine_art: 1–5 — reverence and restraint; surrealism can push to 7
        modern_digital_ui: 3–7 — motion is functional feedback, not spectacle
        illustration_graphic: 2–5 — let the illustration be the star, motion supports
        cultural_regional: varies wildly — wabi-sabi at 1–3, psychedelic at 8–10
        generative_algorithmic: 6–10 — motion IS the medium
        photography_rendering: 3–6 — cinematic pacing, not hyperactivity
    visual_density:
      range: 1–10
      description: How much content occupies a given viewport
      tiers:
        spacious: "1–3: one element at a time, dramatic white space, luxury breathing room"
        balanced: "4–6: standard app/site density, readable rhythm"
        dense: "7–10: dashboards, data tables, multi-panel interfaces, minimal padding"
      per_style_guidance:
        historical_fine_art: 2–5 — art needs room
        modern_digital_ui: 4–8 — functional density matched to purpose
        illustration_graphic: 3–6 — illustrations need framing
        cultural_regional: 2–6 — cultural styles often value emptiness (ma, negative space)
        generative_algorithmic: varies — noise fields sparse, cellular automata dense
        photography_rendering: 2–5 — photos need to breathe
    audience_formality:
      range: 1–10
      description: How formal or casual the overall tone reads
      tiers:
        casual: "1–3: playful, rounded, warm, conversational — apps for consumers, creators, kids"
        professional: "4–6: clean, trustworthy, competent — SaaS, productivity, enterprise"
        authoritative: "7–10: sharp, prestigious, editorial — finance, law, luxury, institutional"
      note:
        "This dial is independent of visual style. Art Deco at formality 3 is a retro cocktail bar app. Art Deco at formality
        9 is a private bank. Same style, different implementation. This is how the taxonomy breaks free from style-to-use-case
        clichés.

        "
  style_implementations:
    - style_id: art-deco
      default_dials:
        design_variance: 5
        motion_intensity: 4
        visual_density: 5
        audience_formality: 8
      typography:
        display: geometric display serif or high-contrast sans with extreme weight contrast
        body: premium_sans_stack
        tracking: -0.02em on display, normal on body
      motion_character: regal entrance sequences along vertical axis — shimmer, not bounce
      anti_slop_overrides:
        - no default gold (#FFD700) — use brass (#C9A84C) or antique gold (#B8860B)
        - no rounded-full containers — chamfered or sharp corners only
        - metallic gradients via multi-stop linear-gradient, never a solid gold fill
        - symmetry must be bilateral and intentional, not centered-by-default
      premium_component_patterns:
        - spotlight border cards with gold-tinted cursor-tracking glow
        - vertical reveal animations staggered along symmetry axis
        - beveled divider lines using CSS border-image with metallic gradient
        - stepped/zigzag decorative border components
    - style_id: impressionism
      default_dials:
        design_variance: 6
        motion_intensity: 3
        visual_density: 2
        audience_formality: 5
      typography:
        display: editorial_serif_stack with generous letter-spacing
        body: light-weight humanist sans-serif
        tracking: normal to +0.01em (airy)
      motion_character: slow parallax drift — nothing snaps, everything eases gently
      anti_slop_overrides:
        - no hard borders on any element — use tinted blur or soft gradient edges
        - no saturated flat-color blocks — everything is blended, atmospheric
        - background gradients should feel like natural light, not synthetic
      premium_component_patterns:
        - gradient mesh backgrounds simulating light through atmosphere
        - layered parallax depth with independently drifting tinted planes
        - ambient slow gradient blobs (20s+ cycle, opacity 0.03) for living backgrounds
        - image components with painterly CSS filter stacks (blur + saturate + contrast)
    - style_id: constructivism
      default_dials:
        design_variance: 9
        motion_intensity: 5
        visual_density: 8
        audience_formality: 8
      typography:
        display: condensed geometric sans-serif at extreme scale contrast (80px+ headlines, 12px body)
        body: same family, regular weight
        tracking: tight on headlines (-0.03em), wide on labels (+0.08em uppercase)
      motion_character: mechanical, linear, abrupt — hard cuts, diagonal slides, stamp impacts
      anti_slop_overrides:
        - zero box-shadow anywhere — depth comes from overlap and color contrast only
        - zero border-radius anywhere — all corners sharp
        - no more than 3 colors total (red, black, white + optional ochre)
        - no centered layouts — everything is dynamic diagonal or asymmetric
      premium_component_patterns:
        - diagonal slide-in reveals with hard stops (no ease-out)
        - split-screen scroll with opposing slide directions
        - rotated text blocks at 15–45 degrees as compositional elements
        - overlapping frame components with z-index layering for propaganda-poster depth
    - style_id: art-nouveau
      default_dials:
        design_variance: 6
        motion_intensity: 4
        visual_density: 5
        audience_formality: 6
      typography:
        display: decorative serif with swash alternates (enable OpenType ss01–ss03, swsh)
        body: humanist sans-serif for readability
      motion_character: organic growth — vine tendrils extending, flowers blooming, sinusoidal ease
      anti_slop_overrides:
        - no geometric grid rigidity — layout follows organic curvilinear paths
        - no flat solid fills without ornamental border or vine-frame context
        - clip-paths and SVG masks must use organic curves, never rectangles
      premium_component_patterns:
        - SVG whiplash-curve section dividers instead of horizontal rules
        - organic mask shapes for image clipping (vine, leaf, shell contours)
        - hover-triggered vine/tendril SVG path-drawing animations
        - ornamental corner and border frame components as reusable SVG sets
    - style_id: bauhaus
      default_dials:
        design_variance: 4
        motion_intensity: 2
        visual_density: 4
        audience_formality: 6
      typography:
        display: Futura, DIN, or strict geometric sans — one family, two weights max
        body: same family, lighter weight
      motion_character: deterministic geometric transforms — rotate, scale, translate along grid axes
      anti_slop_overrides:
        - no decoration that doesn't serve function — strip everything ornamental
        - no more than 5 colors total (R/B/Y + B/W) — this is a hard constraint
        - border-radius is either 0px or 50% (circle) — no in-between values
        - no photographic imagery — shapes, type, and color only
      premium_component_patterns:
        - shape-primitive icon system (circle, square, triangle as first-class tokens)
        - golden-ratio or Fibonacci-proportioned grid modules
        - color-block section backgrounds using primaries as semantic markers
        - animated geometric compositions that rearrange on scroll/resize
    - style_id: de-stijl
      default_dials:
        design_variance: 5
        motion_intensity: 2
        visual_density: 5
        audience_formality: 7
      typography:
        display: geometric sans-serif, uppercase only for headings
        body: same family, normal case
      motion_character: rectilinear — elements slide horizontally or vertically only, never diagonally
      anti_slop_overrides:
        - absolutely no curves — all right angles, always
        - no gradients — pure flat color rectangles only
        - strokes are 2px, 4px, or 8px black — no other options
        - "exactly 6 color tokens: red, blue, yellow, black, white, gray"
      premium_component_patterns:
        - Mondrian-inspired CSS Grid with thick black gap borders
        - panel slide-and-resize transitions between layout states
        - colored rectangle backgrounds that rebalance asymmetrically on breakpoint change
    - style_id: rococo
      default_dials:
        design_variance: 7
        motion_intensity: 5
        visual_density: 7
        audience_formality: 6
      typography:
        display: ornamental serif with swashes, ligatures, and stylistic alternates
        body: elegant transitional serif
      motion_character: theatrical reveal — unfurl, shimmer, sparkle, gentle spring with flourish
      anti_slop_overrides:
        - no flat/minimal treatment — ornamental density is mandatory
        - no monospace or geometric sans — everything is serif or script
        - no default CSS gradients — use gilded multi-stop radial gradients
      premium_component_patterns:
        - decorative scrollwork frame components as reusable SVG borders
        - gold-to-cream radial gradients simulating gilded surfaces
        - parallax depth between foreground ornament and background content
        - "sparkle/shimmer particle effects on hover (canvas or CSS, pointer-events: none)"
    - style_id: surrealism
      default_dials:
        design_variance: 10
        motion_intensity: 7
        visual_density: 4
        audience_formality: 4
      typography:
        display: serif for body, unexpected display disruptions (scale shifts, baseline breaks)
        body: editorial_serif_stack
      motion_character: dreamlike — slow morphs, impossible physics, unexpected accelerations
      anti_slop_overrides:
        - no symmetrical, orderly layouts — spatial disruption is the point
        - no consistent shadow direction — light sources should feel wrong
        - no standard card components — every container should feel slightly off
      premium_component_patterns:
        - warped CSS perspective transforms creating impossible spatial relationships
        - morphing shape-path transitions between states
        - z-index layering that creates physically impossible overlaps
        - slow dreamlike parallax where layers move in contradictory directions
    - style_id: pop-art
      default_dials:
        design_variance: 6
        motion_intensity: 5
        visual_density: 7
        audience_formality: 3
      typography:
        display: bold condensed sans or comic-style lettering
        body: bold sans-serif — nothing delicate
      motion_character: snappy, comic-book energy — POW-burst on tap, frame-by-frame
      anti_slop_overrides:
        - no muted or pastel colors — full saturation CMYK primaries
        - no subtle shadows — offset hard shadows in contrasting color (4px+)
        - halftone dot patterns are mandatory on at least one surface
      premium_component_patterns:
        - Ben-Day dot CSS background patterns via radial-gradient repeating tiles
        - comic-panel grid layout with thick black gutter borders
        - burst/explosion CSS shapes on interaction (clip-path star animations)
        - screen-print color registration offset effect (duplicate layers with slight shift)
    - style_id: minimalism-fine-art
      default_dials:
        design_variance: 3
        motion_intensity: 1
        visual_density: 1
        audience_formality: 8
      typography:
        display: thin geometric sans-serif at restrained scale
        body: same family, light weight, generous tracking
      motion_character: near-imperceptible — slow opacity shifts, contemplative pacing
      anti_slop_overrides:
        - no more than 2 colors total
        - no shadows, borders, or decorative elements
        - spacing tokens must include dramatically large values (64px, 128px, 256px)
        - one typeface, two weights maximum
      premium_component_patterns:
        - extreme negative space compositions — single focal element per viewport
        - ultra-slow opacity transitions (2000ms+) for state changes
        - hairline 0.5px borders only when absolutely necessary for separation
    - style_id: flat-design
      default_dials:
        design_variance: 3
        motion_intensity: 3
        visual_density: 5
        audience_formality: 5
      typography:
        display: premium_sans_stack — geometric or grotesque
        body: same stack, regular weight
      motion_character: clean functional transitions — color state changes, slide/fade
      anti_slop_overrides:
        - no shadows, gradients, or textures — the constraint IS the style
        - color must do all the hierarchy work — invest heavily in palette
        - 6–10 hues with tints, but each must be intentionally placed
      premium_component_patterns:
        - color-coded section semantics where hue carries meaning
        - bold icon system with consistent stroke weight (filled OR outlined, not mixed)
        - bento-grid feature cards with asymmetric sizing for visual hierarchy
    - style_id: material-design
      default_dials:
        design_variance: 3
        motion_intensity: 4
        visual_density: 5
        audience_formality: 6
      typography:
        display: premium_sans_stack (not Roboto — that's the default we're avoiding)
        body: same stack with strict Material type scale ratios
      motion_character: Material standard curve (0.4, 0.0, 0.2, 1) — container transforms, ripples
      anti_slop_overrides:
        - use Material 3 dynamic color / tonal palette, not static Material 2 palette
        - elevation shadows must be defined as 5-tier system, not ad-hoc
        - ripple effects on interactive elements or don't claim Material
      premium_component_patterns:
        - shared-element container transforms between navigation states
        - tonal surface hierarchy (surface-0 through surface-4) using color-mix()
        - dynamic color extraction from hero imagery for adaptive theming
    - style_id: neomorphism
      default_dials:
        design_variance: 3
        motion_intensity: 3
        visual_density: 3
        audience_formality: 5
      typography:
        display: medium-weight premium_sans_stack
        body: same, with high contrast against monochrome background
      motion_character: soft spring with damping — press to inset, release to raise
      anti_slop_overrides:
        - "CRITICAL: add visible focus indicators and clear interactive affordances"
        - use supplementary color cues for state — neumorphism alone is not enough
        - reserve for non-critical UI elements — primary CTAs need stronger contrast
        - test with WCAG contrast tools obsessively — this style fails accessibility by default
      premium_component_patterns:
        - three elevation states (raised, flat, inset) with smooth blend between them
        - supplementary icon fills or subtle color washes to indicate interactivity
        - background gradient shifts to indicate mode/state changes
    - style_id: glassmorphism
      default_dials:
        design_variance: 4
        motion_intensity: 4
        visual_density: 4
        audience_formality: 5
      typography:
        display: medium-weight sans-serif — readability over gradient backgrounds is critical
        body: add text-shadow or backdrop for guaranteed contrast
      motion_character: floating parallax layers — blur intensity shifts on focus/defocus
      anti_slop_overrides:
        - glass panels MUST have a 1px inner border (rgba white at 20–30%) for edge definition
        - blur range 8–20px — beyond 20px is GPU-expensive, below 8px is invisible
        - always provide solid-color fallback for browsers without backdrop-filter
        - never use over busy photographic backgrounds — control what's beneath the glass
      premium_component_patterns:
        - 1px luminous inner stroke + subtle inner shadow for edge refraction simulation
        - parallax between glass panel and background on scroll
        - blur intensity transition on focus (sharp when active, more frosted when inactive)
        - colored gradient backgrounds designed specifically to show through glass
    - style_id: brutalist-web
      default_dials:
        design_variance: 9
        motion_intensity: 1
        visual_density: 6
        audience_formality: 7
      typography:
        display: system monospace or Times New Roman — the browser default IS the point
        body: same — do not override with premium fonts
      motion_character: zero interpolation — instant state switches, hard cuts, no transitions
      anti_slop_overrides:
        - no design system polish — raw HTML structure should be visible
